name: Edge Auth Contract Guard

on:
  workflow_dispatch:

permissions: read-all


jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Guard regression tests
        run: node --test scripts/security/edge-auth-contract-guard.test.mjs
      - name: Run edge-auth-contract guard
        run: node scripts/security/edge-auth-contract-guard.mjs
