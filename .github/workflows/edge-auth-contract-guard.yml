name: Edge Auth Contract Guard

on:
  pull_request:
    paths:
      - "supabase/functions/**"
      - "scripts/security/edge-auth-contract-guard.mjs"
      - "scripts/security/edge-auth-contract-guard.test.mjs"
      - "scripts/security/edge-auth-contract-baseline.json"
  push:
    branches: [main]

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Guard regression tests
        run: node --test scripts/security/edge-auth-contract-guard.test.mjs
      - name: Run edge-auth-contract guard
        run: node scripts/security/edge-auth-contract-guard.mjs
