name: contrast-token-audit

on:
  workflow_dispatch:

permissions: read-all


jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: node scripts/guards/contrast-token-audit.mjs
