name: learner-course-smoke

on:
  pull_request:
    paths:
      - 'src/pages/CoursesPage.tsx'
      - 'src/pages/CourseDetailPage.tsx'
      - 'src/components/course/**'
      - 'src/components/lesson/**'
      - 'tests/e2e/learner-course-smoke.spec.ts'
      - '.github/workflows/learner-course-smoke.yml'
  schedule:
    # Nightly full sweep (LEARNER_SMOKE_FULL=1).
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions: read-all

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: ${{ secrets.STAGING_URL || 'https://examfitde.lovable.app' }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      LEARNER_SMOKE_FULL: ${{ github.event_name == 'schedule' && '1' || '0' }}
      LEARNER_SMOKE_SAMPLE: '8'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: VITE_SUPABASE_PUBLISHABLE_KEY VITE_SUPABASE_URL
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bunx playwright test tests/e2e/learner-course-smoke.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: learner-course-smoke
          path: |
            playwright-report/
            test-results/
          retention-days: 7
