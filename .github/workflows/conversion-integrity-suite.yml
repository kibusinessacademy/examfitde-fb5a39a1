name: Conversion Integrity Suite (Path E)

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  conversion-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      PROD_URL: https://examfitde.lovable.app
      BASE_URL: https://examfitde.lovable.app
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
        github.run_id }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install deps
        run: npm ci --legacy-peer-deps

      # ── Guard 1: Persona Enum Contract ───────────────────────────────────
      - name: Persona Enum Contract (DB ↔ FE drift gate)
        id: g_persona
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/persona-enum-contract.mjs 2>&1 | tee /tmp/g_persona.log

      - name: Report Persona Enum failure
        if: steps.g_persona.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARD_NAME: "Persona Enum Contract"
          GUARD_LOG_PATH: /tmp/g_persona.log
        run: node scripts/ci/guard-report-comment.mjs

      # ── Guard 2: Generic Enum Contract ───────────────────────────────────
      - name: Generic Enum Contract Guard (product_persona, product_track, app_role)
        id: g_enum
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/enum-contract-guard.mjs 2>&1 | tee /tmp/g_enum.log

      - name: Report Generic Enum failure
        if: steps.g_enum.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARD_NAME: "Generic Enum Contract Guard"
          GUARD_LOG_PATH: /tmp/g_enum.log
        run: node scripts/ci/guard-report-comment.mjs

      # ── Path E Suite (G1, G2, G3 shell, G4-G7) ───────────────────────────
      - name: Run Path E suite (G1, G2, G3 shell, G4-G7)
        id: g_pathE
        continue-on-error: true
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -o pipefail
          node scripts/conversion-integrity-suite.mjs 2>&1 | tee /tmp/g_pathE.log

      - name: Report Path E suite failure
        if: steps.g_pathE.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARD_NAME: "Path E Suite (G1-G7)"
          GUARD_LOG_PATH: /tmp/g_pathE.log
        run: node scripts/ci/guard-report-comment.mjs

      # ── G3b Playwright PROD ──────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run G3b — Persona Overlay Hydration (PROD)
        id: g_g3b
        continue-on-error: true
        run: |
          set -o pipefail
          npx playwright test --project=g3b --reporter=list 2>&1 | tee /tmp/g_g3b.log

      - name: Report G3b failure
        if: steps.g_g3b.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARD_NAME: "G3b – Persona Overlay Hydration (PROD)"
          GUARD_LOG_PATH: /tmp/g_g3b.log
        run: node scripts/ci/guard-report-comment.mjs

      - name: Upload Playwright report on failure
        if: steps.g_g3b.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: g3b-playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

      # ── Aggregate guard reports as artifact ──────────────────────────────
      - name: Upload guard-report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-report
          path: guard-report.md
          if-no-files-found: ignore
          retention-days: 14

      # ── Final gate: fail the job if ANY guard failed ─────────────────────
      - name: Final gate
        if: always()
        run: |
          fail=0
          for s in "${{ steps.g_persona.outcome }}" \
                   "${{ steps.g_enum.outcome }}" \
                   "${{ steps.g_pathE.outcome }}" \
                   "${{ steps.g_g3b.outcome }}"; do
            if [ "$s" = "failure" ]; then fail=1; fi
          done
          if [ "$fail" = "1" ]; then
            echo "❌ Mindestens ein Guard ist fehlgeschlagen — siehe PR-Kommentare/Artifact."
            exit 1
          fi
          echo "✅ Alle Guards grün."
