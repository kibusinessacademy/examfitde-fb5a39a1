name: Conversion Integrity Suite (Path E)

on:
  schedule:
    - cron: "17 */6 * * *"  # alle 6h
  workflow_dispatch:
  pull_request:
    paths:
      - "src/pages/product/ProductPersonaPage.tsx"
      - "src/hooks/useProductPersonaOverlay.ts"
      - "src/lib/landing/**"
      - "supabase/migrations/**"
      - "scripts/conversion-integrity-suite.mjs"

jobs:
  conversion-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Persona Enum Contract (DB ↔ FE drift gate)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/persona-enum-contract.mjs
      - name: Run Path E suite (G1, G2, G3 shell, G4-G7)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROD_URL: https://examfitde.lovable.app
        run: node scripts/conversion-integrity-suite.mjs
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run G3b — Persona Overlay Hydration (PROD)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PROD_URL: https://examfitde.lovable.app
          BASE_URL: https://examfitde.lovable.app
        run: npx playwright test --project=g3b --reporter=list
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: g3b-playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

