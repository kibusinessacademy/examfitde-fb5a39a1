name: E2E Full Journey

on:
  workflow_dispatch:

permissions: read-all

jobs:
  full-journey:
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Full Journey E2E
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://examfitde.lovable.app' }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npx playwright test tests/e2e/learner-full-journey.spec.ts

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-journey-report
          path: playwright-report
          retention-days: 14

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-journey-artifacts
          path: test-results
          retention-days: 14
