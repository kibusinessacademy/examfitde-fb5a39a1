name: Examiner — No Parallel Readiness

on:
  workflow_dispatch:

permissions: read-all

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Run guard
        run: node scripts/guards/examiner-no-parallel-readiness.mjs
