name: Export Audit
on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Package ID to audit'
        required: true
      export_url:
        description: 'Direct URL to export ZIP (optional, skips download)'
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Download export ZIP
        if: ${{ inputs.export_url }}
        run: curl -L "${{ inputs.export_url }}" -o export.zip

      - name: Run audit
        run: node tools/audit-export.mjs export.zip audit_out

      - name: Check score
        run: |
          SCORE=$(node -e "const r=JSON.parse(require('fs').readFileSync('audit_out/audit_report.json','utf8')); console.log(r.score.total)")
          echo "Score: $SCORE"
          if [ "$SCORE" -lt 60 ]; then
            echo "::error::Audit score $SCORE < 60 — BLOCKED"
            exit 1
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit_out/
