name: Export Audit CI

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: "Package ID to export & audit"
        required: true
        type: string
      export_url:
        description: "Direct URL to export ZIP (optional, skips export step)"
        required: false
        type: string
  schedule:
    - cron: "09 4 * * *"

permissions: read-all

jobs:
  audit:
    timeout-minutes: 15
    name: Export & Audit Quality Score
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: npm ci --legacy-peer-deps

      - name: Export package (via edge function)
        if: ${{ !inputs.export_url }}
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
        run: |
          PACKAGE_ID="${{ inputs.package_id }}"
          if [ -z "$PACKAGE_ID" ]; then
            PACKAGE_ID="${{ secrets.DEFAULT_AUDIT_PACKAGE_ID }}"
          fi
          if [ -z "$PACKAGE_ID" ]; then
            echo "⚠️  No package_id provided and DEFAULT_AUDIT_PACKAGE_ID not set – skipping"
            exit 0
          fi
          node scripts/export-package.mjs --packageId="$PACKAGE_ID" --out=export.zip

      - name: Download export ZIP (direct URL)
        if: ${{ inputs.export_url }}
        run: curl -L "${{ inputs.export_url }}" -o export.zip

      - name: Run audit tool
        run: node tools/audit-export.mjs export.zip audit_out

      - name: Score gate
        run: |
          SCORE=$(node -e "const r=JSON.parse(require('fs').readFileSync('audit_out/audit_report.json','utf8')); console.log(r.score.total)")
          echo "📊 Audit Score: $SCORE/100"
          if [ "$SCORE" -lt 60 ]; then
            echo "::error::Audit score $SCORE < 60 — BLOCKED"
            exit 1
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit_out/
