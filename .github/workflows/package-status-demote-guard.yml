name: package-status-demote-guard

on:
  pull_request:
    paths:
      - "supabase/functions/**"
      - "scripts/**"
      - "src/**"
      - "scripts/guards/guard-package-status-demotes.mjs"
      - ".github/workflows/package-status-demote-guard.yml"
  push:
    branches: [main]


jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run guard-package-status-demotes
        run: node scripts/guards/guard-package-status-demotes.mjs
      - name: Run guard integration tests
        run: node scripts/guards/__tests__/guard-package-status-demotes.test.mjs
