name: a11y-routes-parity

on:
  workflow_dispatch:

permissions: read-all


jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: node scripts/guards/a11y-routes-parity.mjs
