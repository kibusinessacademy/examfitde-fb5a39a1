name: Customer Reality Gate (12 Journeys)

# Single Release-Gate über die 12 kanonischen Customer Journeys.
# Bridge über die existierenden learner-reality + pre-customer-reality Aggregatoren.
# Regel: <10/12 PASS → BLOCK. Solange BLOCK keine Funnel-fremden Features deployen.

on:
  schedule:
    - cron: '47 6 * * *' # 06:47 UTC — direkt nach pre-customer-reality (06:37) + learner-reality (06:17)
  workflow_dispatch:
    inputs:
      reality_base_url:
        description: 'REALITY_BASE_URL override (leave empty = auto-detect currently published domain: berufos.com → examfitde.lovable.app)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: customer-reality-gate
  cancel-in-progress: false

jobs:
  gate:
    name: Customer Reality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      # P0.1 Domain-Drift-Fix (2026-06-05): Default = Production-Authority `berufos.com`.
      # Resolution order:
      #   1) workflow_dispatch input `reality_base_url` (operator override)
      #   2) repo secret REALITY_BASE_URL
      #   3) Auto-detect step below (berufos.com → examfitde.lovable.app)
      # Step "Resolve REALITY_BASE_URL" writes the final value into $GITHUB_ENV,
      # which overrides this default for subsequent steps.
      REALITY_BASE_URL: ${{ github.event.inputs.reality_base_url != '' && github.event.inputs.reality_base_url || secrets.REALITY_BASE_URL || '' }}
      REALITY_LEARNER_EMAIL: ${{ secrets.REALITY_LEARNER_EMAIL }}
      REALITY_LEARNER_PASSWORD: ${{ secrets.REALITY_LEARNER_PASSWORD }}
      CHECKOUT_TEST_MODE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Resolve REALITY_BASE_URL (auto-detect published domain)
        # If neither workflow_dispatch input nor secret provided a base URL,
        # probe the candidate domains in priority order and pick the first one
        # that responds 200. This keeps the gate runnable even if the secret
        # is missing, and automatically follows the currently-served domain
        # (custom domain berufos.com → Lovable subdomain examfitde.lovable.app).
        run: |
          set -e
          CURRENT="${REALITY_BASE_URL}"
          if [ -n "$CURRENT" ]; then
            echo "Using provided REALITY_BASE_URL=$CURRENT"
            echo "REALITY_BASE_URL=$CURRENT" >> "$GITHUB_ENV"
            exit 0
          fi
          for CANDIDATE in "https://berufos.com" "https://examfitde.lovable.app"; do
            CODE=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 10 "$CANDIDATE/" || echo "000")
            echo "Probe $CANDIDATE → HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "Auto-detected REALITY_BASE_URL=$CANDIDATE"
              echo "REALITY_BASE_URL=$CANDIDATE" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "::error::No candidate domain responded 200 — set REALITY_BASE_URL secret or workflow_dispatch input."
          exit 2

      - name: Reset reality results (Hygiene Guard)
        # Verhindert, dass alte P0-Findings aus früheren Runs den Gate dauerhaft
        # blocken oder neue/alte Findings vermischt werden. Jeder Run startet sauber.
        run: rm -rf reality-results test-results playwright-report

      - name: Stamp run context
        # Liefert run_id + base_url an den Aggregator (für Beweisbarkeit im Report).
        run: |
          mkdir -p reality-results
          echo "{\"run_id\":\"${{ github.run_id }}\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"base_url\":\"${REALITY_BASE_URL}\",\"started_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > reality-results/run-context.json

      - name: Cold-Load Verify (Early-Fail Gate P0.1–P0.4)
        id: coldload
        run: node scripts/cold-load-verify.mjs
        # Early-Fail: schützt den Public-Funnel vor stiller Regression
        # und macht Gate-BLOCKs erklärbarer, bevor wir Playwright zünden.

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Validate resolved REALITY_BASE_URL (HTTP status gate)
        id: validatebase
        # Re-probes the resolved REALITY_BASE_URL (post auto-detect) on the
        # three canonical funnel paths. Any non-200 (404 / 500 / 502 / 503 /
        # connection error / unexpected redirect off-host) hard-fails the job
        # BEFORE the Live Smoke step. Without this, the smoke script would run
        # against a partially-broken deploy and produce noisy false positives.
        run: |
          set -e
          if [ -z "${REALITY_BASE_URL}" ]; then
            echo "::error::REALITY_BASE_URL is empty after resolve step."
            exit 2
          fi
          HOST=$(echo "${REALITY_BASE_URL}" | sed -E 's#^https?://([^/]+).*#\1#')
          echo "Validating ${REALITY_BASE_URL} (host=${HOST})"
          FAILED=0
          for P in "/" "/berufe" "/preise" "/oral-exam"; do
            URL="${REALITY_BASE_URL}${P}"
            # -o /dev/null discards body; -w writes status + final URL
            RESP=$(curl -sSL -o /dev/null -w "%{http_code} %{url_effective}" \
              --max-time 15 \
              -H "User-Agent: LovableRealityGate-BaseValidator/1.0" \
              "$URL" || echo "000 ERR")
            CODE=$(echo "$RESP" | awk '{print $1}')
            FINAL=$(echo "$RESP" | awk '{print $2}')
            FINAL_HOST=$(echo "$FINAL" | sed -E 's#^https?://([^/]+).*#\1#')
            if [ "$CODE" != "200" ]; then
              echo "::error::HTTP $CODE for $URL (final=$FINAL)"
              FAILED=$((FAILED+1))
              continue
            fi
            if [ -n "$FINAL_HOST" ] && [ "$FINAL_HOST" != "$HOST" ]; then
              echo "::error::$URL redirected off-host to $FINAL_HOST (expected $HOST) — domain drift"
              FAILED=$((FAILED+1))
              continue
            fi
            echo "OK  $CODE  $URL"
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED path(s) failed validation — aborting before Live Smoke."
            exit 2
          fi
          echo "All paths returned 200 on-host. Proceeding to Live Smoke."

      - name: Live Published Smoke (Pre-Flight)
        id: livesmoke
        # Hard fail-fast: if the deployed build at REALITY_BASE_URL doesn't
        # serve a fresh /berufe (≥10 links), /preise (24,90 €) and /oral-exam
        # surface, the Playwright run would just produce stale findings.
        # Better to abort here and tell the operator to publish first.
        # Gated by the "Validate resolved REALITY_BASE_URL" step above —
        # a non-200 base URL skips this step entirely.
        run: node scripts/live-smoke-published.mjs

      - name: Run pre-customer-reality
        continue-on-error: true
        run: bunx playwright test --project=pre-customer-reality

      - name: Aggregate pre-customer
        continue-on-error: true
        run: node scripts/pre-customer-reality-aggregate.mjs

      - name: Run learner-reality
        continue-on-error: true
        run: bunx playwright test --project=learner-reality

      - name: Aggregate learner
        continue-on-error: true
        run: node scripts/learner-reality-aggregate.mjs

      - name: Customer Reality Gate (12 Journeys)
        id: gate
        continue-on-error: true
        run: node scripts/customer-reality-gate.mjs

      - name: Render summary
        if: always()
        run: |
          if [ -f reality-results/customer-reality-gate.md ]; then
            cat reality-results/customer-reality-gate.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Gate produced no report" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: UX-Gap Scan (combined Reality + Static + DB signals)
        id: uxgap
        continue-on-error: true
        env:
          PGHOST: ${{ secrets.SUPABASE_DB_HOST }}
          PGUSER: ${{ secrets.SUPABASE_DB_USER }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGDATABASE: ${{ secrets.SUPABASE_DB_NAME }}
          PGPORT: ${{ secrets.SUPABASE_DB_PORT }}
        run: node scripts/ux-gap-scan.mjs || true

      - name: Push P0 UX-Gaps → P18 Ledger (ux-gap-bridge)
        id: uxbridge
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          REPORT="/mnt/documents/ux-gap-report.json"
          [ -f "$REPORT" ] || REPORT="reality-results/ux-gap-report.json"

          # Default health signals — consumed by the alert step below.
          echo "report_present=false"   >> "$GITHUB_OUTPUT"
          echo "total_findings=0"        >> "$GITHUB_OUTPUT"
          echo "p0_findings=0"           >> "$GITHUB_OUTPUT"
          echo "bridge_skipped=true"     >> "$GITHUB_OUTPUT"
          echo "bridge_failed=0"         >> "$GITHUB_OUTPUT"
          echo "bridge_recorded=0"       >> "$GITHUB_OUTPUT"
          echo "bridge_http_status=0"    >> "$GITHUB_OUTPUT"

          if [ ! -f "$REPORT" ]; then
            echo "::warning::ux-gap-report.json missing — scanner produced no output"
            echo "## UX-Gap → P18 Bridge"   >> "$GITHUB_STEP_SUMMARY"
            echo "❌ report missing"        >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "report_present=true" >> "$GITHUB_OUTPUT"

          TOTAL=$(node -e "const r=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));console.log((r.findings||r||[]).length)" "$REPORT")
          echo "total_findings=$TOTAL" >> "$GITHUB_OUTPUT"

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_URL / SERVICE_ROLE_KEY not set — skipping bridge POST"
            exit 0
          fi

          P0_JSON=$(node -e "
            const r = JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));
            const items = (r.findings || r || []).filter(f => f.severity === 'P0');
            process.stdout.write(JSON.stringify({ findings: items }));
          " "$REPORT")
          COUNT=$(echo "$P0_JSON" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).findings.length))")
          echo "p0_findings=$COUNT" >> "$GITHUB_OUTPUT"
          echo "P0 findings to bridge: $COUNT"
          echo "## UX-Gap → P18 Bridge" >> "$GITHUB_STEP_SUMMARY"
          echo "Total findings: **$TOTAL**, P0: **$COUNT**" >> "$GITHUB_STEP_SUMMARY"

          if [ "$COUNT" = "0" ]; then
            echo "bridge_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "bridge_skipped=false" >> "$GITHUB_OUTPUT"
          HTTP_CODE=$(curl -sS -o /tmp/bridge-resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            --data "$P0_JSON" \
            "$SUPABASE_URL/functions/v1/ux-gap-bridge")
          echo "bridge_http_status=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          RESP=$(cat /tmp/bridge-resp.json 2>/dev/null || echo '{}')
          echo "$RESP"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$RESP"   >> "$GITHUB_STEP_SUMMARY"
          echo '```'     >> "$GITHUB_STEP_SUMMARY"

          REC=$(echo "$RESP"   | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).recorded||0)}catch{console.log(0)}})")
          FAIL=$(echo "$RESP"  | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).failed||0)}catch{console.log(0)}})")
          echo "bridge_recorded=$REC" >> "$GITHUB_OUTPUT"
          echo "bridge_failed=$FAIL"  >> "$GITHUB_OUTPUT"

      - name: Health-Check Alert (zero-findings / bridge failure)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_PRESENT: ${{ steps.uxbridge.outputs.report_present }}
          TOTAL: ${{ steps.uxbridge.outputs.total_findings }}
          P0: ${{ steps.uxbridge.outputs.p0_findings }}
          BRIDGE_SKIPPED: ${{ steps.uxbridge.outputs.bridge_skipped }}
          BRIDGE_FAILED: ${{ steps.uxbridge.outputs.bridge_failed }}
          BRIDGE_RECORDED: ${{ steps.uxbridge.outputs.bridge_recorded }}
          HTTP_CODE: ${{ steps.uxbridge.outputs.bridge_http_status }}
        run: |
          set +e
          REASONS=()
          # 1) Scanner did not even produce a report -> wiring is broken
          if [ "${REPORT_PRESENT:-false}" != "true" ]; then
            REASONS+=("scanner produced no ux-gap-report.json")
          fi
          # 2) Scanner produced a report but ZERO findings of any severity
          #    (P0+P1+P2). Means the three sources silently went dark.
          if [ "${REPORT_PRESENT:-false}" = "true" ] && [ "${TOTAL:-0}" = "0" ]; then
            REASONS+=("scan returned 0 total findings (P0+P1+P2) — sources may be dark")
          fi
          # 3) Bridge attempted but HTTP error or every row failed
          if [ "${BRIDGE_SKIPPED:-true}" = "false" ]; then
            if [ "${HTTP_CODE:-0}" != "200" ]; then
              REASONS+=("bridge HTTP ${HTTP_CODE} (expected 200)")
            fi
            if [ "${BRIDGE_FAILED:-0}" != "0" ] && [ "${BRIDGE_RECORDED:-0}" = "0" ]; then
              REASONS+=("bridge recorded 0 / failed ${BRIDGE_FAILED} — every finding rejected")
            fi
          fi

          if [ "${#REASONS[@]}" = "0" ]; then
            echo "UX-Gap health OK (total=${TOTAL}, p0=${P0}, recorded=${BRIDGE_RECORDED})"
            exit 0
          fi

          TITLE="[UX-Gap Health] Daily run flagged $(date -u +%Y-%m-%d) — ${#REASONS[@]} issue(s)"
          BODY=$(printf '## UX-Gap → P18 Bridge — daily health alert\n\n- run: %s\n- total findings: %s\n- p0 findings: %s\n- bridge http: %s\n- bridge recorded: %s / failed: %s\n\n### Reasons\n' \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${TOTAL}" "${P0}" "${HTTP_CODE}" "${BRIDGE_RECORDED}" "${BRIDGE_FAILED}")
          for R in "${REASONS[@]}"; do BODY="${BODY}- ${R}"$'\n'; done
          echo "::warning::${TITLE}"
          echo "## ⚠️ UX-Gap Health Alert"  >> "$GITHUB_STEP_SUMMARY"
          for R in "${REASONS[@]}"; do echo "- $R" >> "$GITHUB_STEP_SUMMARY"; done

          # Open or update a daily GitHub issue (one per UTC day) so the operator
          # gets a notification via standard GitHub notification channels.
          DAY=$(date -u +%Y-%m-%d)
          if command -v gh >/dev/null 2>&1; then
            EXISTING=$(gh issue list --search "UX-Gap Health daily ${DAY} in:title" --state open --json number --jq '.[0].number' 2>/dev/null)
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "$BODY" || true
            else
              gh issue create --title "UX-Gap Health daily ${DAY}" --label "ops,ux-gap" --body "$BODY" || true
            fi
          fi
          # Mark step as failed so the run is visibly red — but only for hard issues
          exit 1

      - name: Upload reality-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-reality-gate-${{ github.run_id }}
          path: |
            reality-results/
            /mnt/documents/ux-gap-report.json
          retention-days: 30

      - name: Hard-fail on BLOCK / REVIEW
        if: always()
        run: |
          if [ ! -f reality-results/customer-reality-gate.json ]; then
            echo "::error::Gate did not produce results.json"
            exit 2
          fi
          VERDICT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('reality-results/customer-reality-gate.json','utf8')).verdict)")
          PASS=$(node -e "const r=JSON.parse(require('fs').readFileSync('reality-results/customer-reality-gate.json','utf8'));console.log(r.pass+'/'+r.total)")
          echo "Verdict=$VERDICT  Score=$PASS"
          if [ "$VERDICT" = "BLOCK" ]; then exit 2; fi
          if [ "$VERDICT" = "REVIEW" ]; then exit 1; fi
          exit 0
