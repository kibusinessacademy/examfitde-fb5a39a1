name: Cloudflare Pages Deploy + SPA Smoke
# resync-trigger: 2026-05-14T18:20Z

on:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    outputs:
      preview_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Commit drift diagnostics
        run: |
          echo "::group::SHA drift diagnostics"
          echo "GITHUB_REF        = $GITHUB_REF"
          echo "GITHUB_SHA        = $GITHUB_SHA"
          echo "Checkout HEAD     = $(git rev-parse HEAD)"
          echo "Checkout HEAD msg = $(git log -1 --oneline HEAD)"
          git fetch origin main --quiet || true
          ORIGIN_MAIN=$(git rev-parse origin/main 2>/dev/null || echo 'unknown')
          echo "origin/main HEAD  = $ORIGIN_MAIN"
          if [ "$GITHUB_SHA" = "$ORIGIN_MAIN" ]; then
            echo "✅ Checkout-SHA == origin/main HEAD"
          else
            echo "⚠️  Checkout-SHA != origin/main HEAD (drift!)"
          fi
          LOCK_SHA=$(sha256sum package-lock.json | awk '{print $1}')
          echo "package-lock.json sha256 = $LOCK_SHA"
          echo "package-lock.json last touched commit:"
          git log -1 --oneline -- package-lock.json || true
          echo "::endgroup::"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_URL VITE_SUPABASE_PROJECT_ID VITE_SUPABASE_PUBLISHABLE_KEY
            VITE_SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi

      - name: Verify dependency manifest before install
        run: |
          node -e "const p=require('./package.json'); console.log('package.json vite=', p.devDependencies.vite); console.log('package.json vite-plugin-pwa=', p.dependencies['vite-plugin-pwa']);"
          node -e "const l=require('./package-lock.json'); const root=l.packages['']; console.log('lockfile root vite=', root.devDependencies.vite); console.log('lockfile root vite-plugin-pwa=', root.dependencies['vite-plugin-pwa']); console.log('resolved vite=', l.packages['node_modules/vite'].version); console.log('resolved vite-plugin-pwa=', l.packages['node_modules/vite-plugin-pwa'].version);"

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Env check (Frontend + Cloudflare)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_TARGET: cloudflare
        run: node scripts/check-env.mjs

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Verify SPA fallback file exists
        run: |
          test -f dist/404.html || (echo "::error::dist/404.html missing" && exit 1)
          test -f dist/index.html || (echo "::error::dist/index.html missing" && exit 1)
          # Sanity: 404.html must contain the SPA shell marker
          grep -q '<div id="root">' dist/404.html || (echo "::error::dist/404.html is not the SPA shell" && exit 1)
          echo "✅ dist/404.html is SPA shell"

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=examfit --branch=main
            --commit-dirty=true

  smoke:
    name: SPA Fallback Smoke
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Wait for CF Pages propagation
        run: sleep 30

      - name: Smoke against examfit.pages.dev
        env:
          HOST: https://examfit.pages.dev
        run: node scripts/seo/spa-fallback-smoke.mjs

      - name: Smoke against berufos.com (if live)
        continue-on-error: true
        env:
          HOST: https://berufos.com
        run: node scripts/seo/spa-fallback-smoke.mjs
