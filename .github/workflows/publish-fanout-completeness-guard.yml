name: Publish Fanout Completeness Guard

on:
  workflow_dispatch:

permissions: read-all

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Run publish-fanout-completeness guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLISH_FANOUT_GUARD_ALLOW: "0"
        run: node scripts/guards/publish-fanout-completeness-guard.mjs
