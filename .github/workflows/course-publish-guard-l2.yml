name: course-publish-guard-l2

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/course-publish-guard-l2-test.mjs'
      - 'tests/e2e/course-publish-guard-l2.spec.ts'
      - '.github/workflows/course-publish-guard-l2.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/course-publish-guard-l2-test.mjs'
      - 'tests/e2e/course-publish-guard-l2.spec.ts'
      - '.github/workflows/course-publish-guard-l2.yml'
  schedule:
    - cron: '47 4 * * *'  # nightly 04:47 UTC
  workflow_dispatch:

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard-l2:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - name: Run publish-guard L2 CI test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/guards/course-publish-guard-l2-test.mjs
