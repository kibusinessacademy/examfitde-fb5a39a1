name: course-publish-guard-l2

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/course-publish-guard-l2-test.mjs'
      - 'tests/e2e/course-publish-guard-l2.spec.ts'
      - '.github/workflows/course-publish-guard-l2.yml'
  push:
    branches: [ main ]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/course-publish-guard-l2-test.mjs'
      - 'tests/e2e/course-publish-guard-l2.spec.ts'
      - '.github/workflows/course-publish-guard-l2.yml'
  schedule:
    - cron: '47 4 * * *' # nightly 04:47 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  guard-l2:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY VITE_SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run publish-guard L2 CI test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/guards/course-publish-guard-l2-test.mjs
