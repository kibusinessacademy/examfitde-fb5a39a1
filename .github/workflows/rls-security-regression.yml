name: RLS Security Regression

on:
  pull_request:
    paths: [ "supabase/migrations/**" ]
  schedule:
    - cron: "33 2 * * *"
  workflow_dispatch: {}

permissions: read-all

jobs:
  rls:
    timeout-minutes: 15
    name: RLS Security Check
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY ||
            secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Check required secrets
        id: secrets
        shell: bash
        run: |
          missing=0
          [ -z "${SUPABASE_URL:-}" ]      && { echo "❌ Missing SUPABASE_URL (or VITE_SUPABASE_URL)"; missing=1; }
          [ -z "${SUPABASE_ANON_KEY:-}" ] && { echo "❌ Missing SUPABASE_ANON_KEY (or VITE_SUPABASE_PUBLISHABLE_KEY)"; missing=1; }

          strict="false"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            strict="true"
          fi

          if [ "$missing" -eq 1 ]; then
            if [ "$strict" = "true" ]; then
              echo "::error::Required secrets missing on protected run (schedule/main) — failing hard."
              exit 1
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::RLS Regression skipped — required Supabase secrets missing."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "✅ Required secrets present"
          fi

      - name: Skip notice
        if: steps.secrets.outputs.skip == 'true'
        run: 'echo \"RLS Regression skipped: missing required Supabase secrets.\"'

      - name: Run RLS regression
        if: steps.secrets.outputs.skip != 'true'
        run: node scripts/rls-security-check.mjs
