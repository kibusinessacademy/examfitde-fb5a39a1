name: E2E Pipeline Integrity Guard

on:
  schedule:
    - cron: '23 * * * *'  # stündlich, 6 Min nach DB-Cron
  push:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/e2e-integrity-check.mjs'
  pull_request:
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  e2e-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - run: node scripts/e2e-integrity-check.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
