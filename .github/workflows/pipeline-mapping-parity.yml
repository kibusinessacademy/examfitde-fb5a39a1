name: Pipeline Mapping Parity Guard

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  mapping-parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run pipeline mapping parity check
        run: node scripts/ci/check-step-mapping-parity.mjs
