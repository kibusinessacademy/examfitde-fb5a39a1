name: Content Graph Smoke (T1–T7, hard-fail)

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/content-graph-smoke.mjs'
      - '.github/workflows/content-graph-smoke.yml'
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run content graph smoke
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/guards/content-graph-smoke.mjs
