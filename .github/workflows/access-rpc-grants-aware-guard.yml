name: access-rpc-grants-aware-guard

on:
  pull_request:
    paths:
      - 'supabase/migrations/**.sql'
      - 'scripts/guards/access-rpc-grants-aware-guard.mjs'
      - 'scripts/guards/access-rpc-grants-aware-baseline.json'
      - '.github/workflows/access-rpc-grants-aware-guard.yml'
  push:
    branches: [main]

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - run: node scripts/guards/access-rpc-grants-aware-guard.mjs
