name: SSOT Payload On-Deploy Check

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 * * * *"

permissions: read-all

jobs:
  verify:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Wait 60s after deploy
        if: github.event_name == 'push'
        run: sleep 60
      - name: Run SSOT payload verification
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SSOT_WINDOW_MIN: "10"
        run: node scripts/ssot-payload-on-deploy-check.mjs
