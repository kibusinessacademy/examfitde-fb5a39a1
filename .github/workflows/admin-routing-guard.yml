name: Admin Routing Guard

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  admin-routing-guard:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Run admin routing guard
        run: npm run lint:admin-routing

      - name: Run view contract guard
        run: npm run guard:view-contracts
