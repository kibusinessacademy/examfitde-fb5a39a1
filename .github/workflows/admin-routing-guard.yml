name: Admin Routing Guard

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions: read-all


jobs:
  admin-routing-guard:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Run admin routing guard
        run: npm run lint:admin-routing

      - name: Run view contract guard
        run: npm run guard:view-contracts
