name: Edge Deploy Drift Guard

on:
  pull_request:
    paths:
      - 'supabase/functions/**'
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  edge-deploy-drift:
    name: Detect undeployed edge function changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run edge deploy drift guard
        run: node scripts/guards/edge-deploy-drift-guard.mjs

      - name: Create issue on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: "Edge Deploy Drift Guard"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/ci/issue-on-fail.mjs
