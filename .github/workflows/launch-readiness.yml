name: launch-readiness

on:
  workflow_dispatch:

permissions: read-all

jobs:
  seo-sellable-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: VITE_SUPABASE_PUBLISHABLE_KEY VITE_SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: node scripts/guards/seo-sellable-pages-guard.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-sellable-pages
          path: seo-sellable-pages.json
          retention-days: 14
