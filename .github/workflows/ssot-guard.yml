name: SSOT Guard

on:
  pull_request:
    paths:
      - 'src/**'
      - 'supabase/**'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'supabase/**'

permissions: read-all


jobs:
  ssot-guard:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run SSOT Guards
        run: |
          chmod +x scripts/ci-ssot-guards.sh
          bash scripts/ci-ssot-guards.sh
