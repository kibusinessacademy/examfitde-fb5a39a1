name: SSOT Guard

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run SSOT Guard
        run: node scripts/ssot-guard.mjs
