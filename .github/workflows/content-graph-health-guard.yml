name: Content Graph Health Guard (warn-only)

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/content-graph-health-guard.mjs'
      - '.github/workflows/content-graph-health-guard.yml'
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  health-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run content graph health guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/guards/content-graph-health-guard.mjs
