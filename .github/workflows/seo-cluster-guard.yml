name: SEO Cluster Guard

on:
  pull_request:
    paths:
      - 'src/pages/seo/**'
      - 'src/routes/AppRoutes.tsx'
      - 'supabase/functions/generate-sitemap/**'
      - 'scripts/seo/**'
      - 'tests/e2e/seo-cluster-smoke.spec.ts'
      - '.github/workflows/seo-cluster-guard.yml'
  workflow_dispatch:


jobs:
  seo-static-audit:
    name: Link, Canonical & Sitemap Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Link & Canonical Audit
        run: node scripts/seo/link-and-canonical-audit.mjs
      - name: Sitemap ↔ Canonical Parity
        run: node scripts/seo/sitemap-canonical-parity.mjs
