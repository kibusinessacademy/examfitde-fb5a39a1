name: Lesson-Join-Parity Contract Guard
on:
  pull_request:
    paths:
      - 'supabase/migrations/**.sql'
      - 'scripts/guards/lesson-join-parity-contract-guard.mjs'
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - run: node scripts/guards/lesson-join-parity-contract-guard.mjs
