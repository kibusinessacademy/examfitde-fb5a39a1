name: PR Preview & Smoke

on:
  workflow_dispatch:

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read


jobs:
  preview-build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Bundle size
        id: bundle
        run: |
          SIZE=$(du -sb dist/ | cut -f1)
          SIZE_MB=$(python3 -c "print(f'{$SIZE / 1048576:.2f}')")
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          JS_COUNT=$(find dist/assets -name "*.js" | wc -l)
          CSS_COUNT=$(find dist/assets -name "*.css" | wc -l)
          echo "js_chunks=$JS_COUNT" >> $GITHUB_OUTPUT
          echo "css_chunks=$CSS_COUNT" >> $GITHUB_OUTPUT

      - name: Unit tests
        id: tests
        continue-on-error: true
        run: |
          npx vitest run --reporter=json --outputFile=test-results.json 2>&1 || true
          if [ -f test-results.json ]; then
            TOTAL=$(jq '.numTotalTests // 0' test-results.json)
            PASSED=$(jq '.numPassedTests // 0' test-results.json)
            FAILED=$(jq '.numFailedTests // 0' test-results.json)
          else
            TOTAL=0; PASSED=0; FAILED=0
          fi
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Guards (all)
        id: guards
        continue-on-error: true
        env:
          CI_DIFF_BASE: origin/main
        run: node scripts/guards/run-changed.mjs

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const bundle = '${{ steps.bundle.outputs.size_mb }}';
            const jsChunks = '${{ steps.bundle.outputs.js_chunks }}';
            const cssChunks = '${{ steps.bundle.outputs.css_chunks }}';
            const testTotal = '${{ steps.tests.outputs.total }}';
            const testPassed = '${{ steps.tests.outputs.passed }}';
            const testFailed = '${{ steps.tests.outputs.failed }}';
            const guardsOk = '${{ steps.guards.outcome }}' === 'success';
            const buildOk = true;

            const icon = (ok) => ok ? 'âś…' : 'âťŚ';
            const testIcon = testFailed > 0 ? 'âš ď¸Ź' : 'âś…';

            const body = `## đź”Ť PR Quality Report

            | Check | Status |
            |-------|--------|
            | TypeScript | ${icon(buildOk)} Passed |
            | Guards (SSOT, Blueprint, ESM, Literals, Pipeline) | ${icon(guardsOk)} ${guardsOk ? 'Passed' : 'Failed'} |
            | Unit Tests | ${testIcon} ${testPassed}/${testTotal} passed |

            ### đź“¦ Bundle
            - **Size:** ${bundle} MB
            - **JS chunks:** ${jsChunks} | **CSS chunks:** ${cssChunks}

            ---
            _Generated by PR Preview & Smoke workflow â€˘ ${new Date().toISOString()}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('PR Quality Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
