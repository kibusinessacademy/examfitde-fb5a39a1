name: Learner E2E

on:
  repository_dispatch:
    types: [ learner_e2e ]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against"
        required: false
        default: "https://examfitde.lovable.app"
      suite:
        description: "Test suite to run (smoke | nightly | all)"
        required: false
        default: "smoke"
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'

permissions: read-all

jobs:
  # ── Post-Publish Smoke (fast, every deploy) ──────────
  smoke:
    if: >
      github.event_name == 'repository_dispatch' || (github.event_name ==
      'workflow_dispatch' && (inputs.suite == 'smoke' || inputs.suite == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke E2E tests
        env:
          BASE_URL: ${{ github.event.client_payload.base_url || inputs.base_url ||
            'https://examfitde.lovable.app' }}
          CURRICULUM_ID: ${{ github.event.client_payload.curriculum_id || '' }}
          E2E_EMAIL: ${{ github.event.client_payload.test_user_email ||
            secrets.E2E_TEST_USER_EMAIL }}
          E2E_PASSWORD: ${{ github.event.client_payload.test_user_password ||
            secrets.E2E_TEST_USER_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npx playwright test --project=smoke

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload traces/videos/screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-artifacts
          path: test-results
          retention-days: 14

  # ── Full Journey (weekly, deep audit) ──────────
  full-journey:
    if: >
      github.event_name == 'schedule' || (github.event_name ==
      'workflow_dispatch' && (inputs.suite == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Full Journey E2E
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://examfitde.lovable.app' }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npx playwright test tests/e2e/learner-full-journey.spec.ts --project=smoke

      - name: Upload Full Journey report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-journey-report
          path: playwright-report
          retention-days: 14

      - name: Upload Full Journey artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-journey-artifacts
          path: test-results
          retention-days: 14

  # ── Nightly Full Rotation (long, scheduled) ──────────
  nightly:
    if: >
      github.event_name == 'schedule' || (github.event_name ==
      'workflow_dispatch' && (inputs.suite == 'nightly' || inputs.suite ==
      'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Nightly E2E tests
        env:
          BASE_URL: ${{ inputs.base_url || 'https://examfitde.lovable.app' }}
          CURRICULUM_ID: ${{ secrets.NIGHTLY_CURRICULUM_ID || '' }}
          E2E_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npx playwright test --project=nightly

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage-report
          path: test-results/coverage-report.json
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload traces/videos/screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-artifacts
          path: test-results
          retention-days: 14
