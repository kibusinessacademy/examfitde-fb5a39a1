name: Content Quality Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate:
    timeout-minutes: 15
    name: ExamFit Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run ci:typecheck

      - name: Guards (changed files)
        env:
          CI_DIFF_BASE: origin/main
        run: npm run ci:guards:changed

      - name: Schema Drift (offline)
        env:
          CI_DIFF_BASE: origin/main
        run: npm run ci:schema:offline

      - name: Production Build
        run: npm run build
