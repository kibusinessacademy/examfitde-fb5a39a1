name: Content Quality Gate

on:
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all


jobs:
  gate:
    timeout-minutes: 15
    name: ExamFit Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run ci:typecheck

      - name: Guards (changed files)
        env:
          CI_DIFF_BASE: origin/main
        run: npm run ci:guards:changed

      - name: Schema Drift (offline)
        env:
          CI_DIFF_BASE: origin/main
        run: npm run ci:schema:offline

      - name: Production Build
        run: npm run build
