name: Release Train

on:
  workflow_dispatch:

permissions: read-all

jobs:
  # 1) TypeScript + Build
  build:
    timeout-minutes: 15
    name: TypeScript + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run build

  # 2) SSOT Guard
  ssot-guard:
    timeout-minutes: 15
    name: SSOT Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: node scripts/ssot-guard.mjs

  # 3) Council Integrity
  council-integrity:
    timeout-minutes: 15
    name: Council Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run council integrity checks
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/council-integrity-check.mjs

  # 4) RLS Security
  rls-security:
    timeout-minutes: 15
    name: RLS Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run RLS security checks
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/rls-security-check.mjs

  # 5) Published Packages Smoke
  smoke:
    timeout-minutes: 15
    name: Published Packages Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run smoke check
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/smoke-published-approved.mjs

  # 6) Customer Reality Gate — 12-Journey Funnel-Doktrin
  customer-reality-gate:
    timeout-minutes: 10
    name: Customer Reality Gate (12 Journeys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Fetch latest customer-reality-gate artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          RUN_ID=$(gh run list \
            --workflow=customer-reality-gate.yml \
            --branch=main --limit=1 --json databaseId \
            --jq '.[0].databaseId' || echo "")
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No customer-reality-gate run found yet — treating as REVIEW."
            mkdir -p reality-results
            echo '{"verdict":"REVIEW","pass":0,"total":12,"rule":"no-run-yet"}' > reality-results/customer-reality-gate.json
          else
            gh run download "$RUN_ID" -n "customer-reality-gate-$RUN_ID" -D reality-results || \
              gh run download "$RUN_ID" -D reality-results || true
          fi
      - name: Enforce gate
        run: |
          F=$(find reality-results -name customer-reality-gate.json | head -1)
          if [ -z "$F" ]; then
            echo "::error::No gate result file found in downloaded artifact"
            exit 2
          fi
          VERDICT=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1],'utf8')).verdict)" "$F")
          SCORE=$(node -e "const r=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));console.log(r.pass+'/'+r.total)" "$F")
          echo "Customer Reality Gate: $VERDICT  Score=$SCORE"
          echo "## Customer Reality Gate: $VERDICT ($SCORE)" >> "$GITHUB_STEP_SUMMARY"
          if [ "$VERDICT" = "BLOCK" ]; then
            echo "::error::BLOCK — <8/12 Customer Journeys PASS. Funnel-Freeze aktiv (mem://constraints/funnel-freeze-until-cors-green-v1)."
            exit 2
          fi
          if [ "$VERDICT" = "REVIEW" ]; then
            echo "::warning::REVIEW — 8 oder 9 / 12 PASS. Release nur mit dokumentierter Funnel-Reparatur."
            exit 1
          fi

  # 7) Final gate — all must pass
  release-gate:
    timeout-minutes: 15
    name: Release Gate ✓
    needs: [ build, ssot-guard, council-integrity, rls-security, smoke, customer-reality-gate ]
    runs-on: ubuntu-latest
    steps:
      - name: All gates passed
        run: echo "✅ Release Train — all gates GREEN incl. Customer Reality Gate. Safe to deploy."

