name: Security Invariants Check

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch: {}

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  security:
    timeout-minutes: 15
    name: Security Invariants
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check required secrets
        id: secrets
        shell: bash
        run: |
          missing=0
          [ -z "${SUPABASE_URL:-}" ]              && { echo "❌ Missing SUPABASE_URL (or VITE_SUPABASE_URL)"; missing=1; }
          [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && { echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY"; missing=1; }

          strict="false"
          if [ "${{ github.event_name }}" = "schedule" ] || \
             { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; }; then
            strict="true"
          fi

          if [ "$missing" -eq 1 ]; then
            if [ "$strict" = "true" ]; then
              echo "::error::Required secrets missing on protected run (schedule/main) — failing hard."
              exit 1
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Security Invariants skipped — required Supabase secrets missing."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "✅ Required secrets present"
          fi

      - name: Skip notice
        if: steps.secrets.outputs.skip == 'true'
        run: echo "Security Invariants skipped: missing required Supabase secrets."

      - name: Run security invariants
        if: steps.secrets.outputs.skip != 'true'
        run: node scripts/security-invariants-check.mjs

      - name: Create issue on failure
        if: failure() && steps.secrets.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: "Security Invariants Check"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/ci/issue-on-fail.mjs
