name: Security Abuse Simulation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  abuse:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TEST_USER_JWT: ${{ secrets.TEST_USER_JWT }}
      ADMIN_TEST_JWT: ${{ secrets.ADMIN_TEST_JWT }}
      DEFAULT_AUDIT_PACKAGE_ID: ${{ secrets.DEFAULT_AUDIT_PACKAGE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check required secrets
        id: secrets
        shell: bash
        run: |
          missing=0
          [ -z "${SUPABASE_URL:-}" ]              && { echo "❌ Missing SUPABASE_URL (or VITE_SUPABASE_URL)"; missing=1; }
          [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && { echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY"; missing=1; }
          [ -z "${TEST_USER_JWT:-}" ]  && echo "::warning::TEST_USER_JWT missing — JWT-based abuse checks will be skipped"
          [ -z "${ADMIN_TEST_JWT:-}" ] && echo "::warning::ADMIN_TEST_JWT missing — admin abuse checks will be skipped"

          strict="false"
          if [ "${{ github.event_name }}" = "schedule" ] || \
             { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; }; then
            strict="true"
          fi

          if [ "$missing" -eq 1 ]; then
            if [ "$strict" = "true" ]; then
              echo "::error::Required secrets missing on protected run (schedule/main) — failing hard."
              exit 1
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Abuse Simulation skipped — required Supabase secrets missing."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "✅ Required secrets present"
          fi

      - name: Skip notice
        if: steps.secrets.outputs.skip == 'true'
        run: echo "Abuse Simulation skipped: missing required Supabase secrets."

      - name: Run abuse simulation
        if: steps.secrets.outputs.skip != 'true'
        run: |
          set -x
          node scripts/security/abuse-simulation.mjs
