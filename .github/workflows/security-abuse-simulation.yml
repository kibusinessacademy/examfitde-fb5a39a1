name: Security Abuse Simulation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions: read-all

jobs:
  abuse:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
      TEST_USER_JWT: ${{ secrets.TEST_USER_JWT }}
      ADMIN_TEST_JWT: ${{ secrets.ADMIN_TEST_JWT }}
      DEFAULT_AUDIT_PACKAGE_ID: ${{ secrets.DEFAULT_AUDIT_PACKAGE_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Check required secrets
        id: secrets
        shell: bash
        run: |
          missing=0
          missing_learner=0
          [ -z "${SUPABASE_URL:-}" ]              && { echo "❌ Missing SUPABASE_URL (or VITE_SUPABASE_URL)"; missing=1; }
          [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && { echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY"; missing=1; }
          [ -z "${TEST_USER_JWT:-}" ]  && { echo "::warning::TEST_USER_JWT missing — abuse simulation skipped"; missing_learner=1; }
          [ -z "${ADMIN_TEST_JWT:-}" ] && echo "::warning::ADMIN_TEST_JWT missing — admin abuse checks will be skipped"

          strict="false"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            strict="true"
          fi

          if [ "$missing" -eq 1 ]; then
            if [ "$strict" = "true" ]; then
              echo "::error::Required secrets missing on protected run (schedule/main) — failing hard."
              exit 1
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Abuse Simulation skipped — required Supabase secrets missing."
          else
            if [ "$missing_learner" -eq 1 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::warning::Abuse Simulation skipped — TEST_USER_JWT is not configured."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "✅ Required secrets present"
            fi
          fi

      - name: Skip notice
        if: steps.secrets.outputs.skip == 'true'
        run: 'echo \"Abuse Simulation skipped: missing required Supabase secrets.\"'

      - name: Run abuse simulation
        if: steps.secrets.outputs.skip != 'true'
        run: |
          set -x
          node scripts/security/abuse-simulation.mjs
