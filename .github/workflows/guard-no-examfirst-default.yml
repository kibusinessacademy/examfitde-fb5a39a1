name: Guard - No EXAM_FIRST Default without Didaktik

on:
  pull_request:
  push:
    branches: [main]

permissions: read-all


jobs:
  guard:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Block hardcoded EXAM_FIRST defaults repo-wide
        run: |
          set -euo pipefail
          echo "🔍 Scanning for dangerous EXAM_FIRST defaults..."

          # Allowlist: files that legitimately reference EXAM_FIRST as a value (not default)
          ALLOW_PATTERN='(_shared/track-normalize\.ts|useTrackConfig\.ts|TrackBadge\.tsx|STEP_KEYS\.md|SSOT_STEP_ORDER|types\.ts|\.test\.|\.spec\.)'

          # 1) Block hardcoded track: "EXAM_FIRST" as default/assignment in ALL edge functions
          HITS=$(grep -RIn --include='*.ts' --exclude-dir=node_modules --exclude-dir=dist \
            -E '(track:\s*["'"'"']EXAM_FIRST["'"'"']|\?\?\s*["'"'"']EXAM_FIRST["'"'"']|\|\|\s*["'"'"']EXAM_FIRST["'"'"'])' \
            supabase/functions/ 2>/dev/null | grep -Ev "$ALLOW_PATTERN" || true)
          if [ -n "$HITS" ]; then
            echo "$HITS"
            echo "::error::Found hardcoded EXAM_FIRST default in edge functions. Default must be AUSBILDUNG_VOLL."
            exit 1
          fi

          # 2) Block hardcoded EXAM_FIRST defaults in src/ (frontend)
          HITS_SRC=$(grep -RIn --include='*.ts' --include='*.tsx' --exclude-dir=node_modules --exclude-dir=dist \
            -E '(\?\?\s*["'"'"']EXAM_FIRST["'"'"']|\|\|\s*["'"'"']EXAM_FIRST["'"'"'])' \
            src/ 2>/dev/null | grep -Ev "$ALLOW_PATTERN" || true)
          if [ -n "$HITS_SRC" ]; then
            echo "$HITS_SRC"
            echo "::error::Found hardcoded EXAM_FIRST default in frontend code. Default must be AUSBILDUNG_VOLL."
            exit 1
          fi

          # 3) Warn on explicit didaktik flags forced false in setup paths
          if grep -RIn --include='*.ts' --exclude-dir=node_modules --exclude-dir=dist \
            'has_learning_course:\s*false' \
            supabase/functions/setup-course-package 2>/dev/null; then
            echo "::error::Found has_learning_course: false in setup-course-package. New packages must default to full didaktik."
            exit 1
          fi

          # 4) Block esm.sh imports
          if grep -RIn --include='*.ts' --exclude-dir=node_modules --exclude-dir=dist \
            'from\s*["'"'"']https://esm\.sh' \
            supabase/functions/ 2>/dev/null; then
            echo "::error::Found esm.sh import. Use npm: specifier instead."
            exit 1
          fi

          echo "✅ All guards passed."
