name: Funnel Tracking Smoke Test

# Verifiziert nach jedem Push, dass Funnel-Tracking nicht umgangen werden kann:
# - RPC track_conversion_event_v2 erzwingt package_id für strict events
# - Edge Function track-funnel-event erzwingt package_id ebenfalls

on:
  push:
    branches: [ main ]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/track-funnel-event/**"
      - "src/lib/conversionTracking.ts"
      - "src/lib/funnelEvents.ts"
      - "src/hooks/useTrackGrowthEvent.ts"
      - "scripts/funnel-tracking-smoke.mjs"
      - ".github/workflows/funnel-tracking-smoke.yml"
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/track-funnel-event/**"
      - "src/lib/conversionTracking.ts"
      - "src/lib/funnelEvents.ts"
      - "src/hooks/useTrackGrowthEvent.ts"
  schedule:
    - cron: "47 * * * *"
  workflow_dispatch:

jobs:
  funnel-tracking-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run Funnel Tracking Smoke
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/funnel-tracking-smoke.mjs
