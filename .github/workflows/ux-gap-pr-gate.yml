name: UX-Gap PR Gate (P0=P1=P2=0)

# Single PR-gate that runs the combined UX-gap sweep
# (static-surface-scan + pre-customer-reality fixtures) on every PR
# and hard-fails if any P0, P1 or P2 finding exists.
#
# SSOT: scripts/ux-gap-scan.mjs (3-source scanner — reality findings,
# static surface, DB entry-fallback). DB-source is skipped without PG creds
# on PRs, which is intended — the gate only enforces the two deterministic
# in-repo sources for fast PR feedback.

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/ux-gap-scan.mjs"
      - "qa-state/pre-customer/**"
      - "reality-results/findings/**"
      - ".github/workflows/ux-gap-pr-gate.yml"
  workflow_dispatch:

concurrency:
  group: ux-gap-pr-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    name: UX-Gap Combined Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Verify Node.js 24
        run: |
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi

      - run: npm ci --legacy-peer-deps

      - name: Regression suite (lock heuristics)
        run: npx vitest run src/test/ux-gap-scan.regression.test.ts --reporter=verbose

      - name: Run combined ux-gap scan (static + pre-customer)
        id: scan
        continue-on-error: true
        env:
          UX_GAP_REPORT_DIR: ${{ github.workspace }}
        run: node scripts/ux-gap-scan.mjs

      - name: Enforce P0=P1=P2=0
        id: enforce
        run: |
          REPORT="${GITHUB_WORKSPACE}/ux-gap-report.json"
          if [ ! -f "$REPORT" ]; then
            echo "::error::ux-gap-report.json not produced — scanner crashed"
            exit 2
          fi
          P0=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$REPORT','utf8')).summary.by_severity.P0)")
          P1=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$REPORT','utf8')).summary.by_severity.P1)")
          P2=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$REPORT','utf8')).summary.by_severity.P2)")
          TOTAL=$((P0 + P1 + P2))
          echo "p0=$P0" >> "$GITHUB_OUTPUT"
          echo "p1=$P1" >> "$GITHUB_OUTPUT"
          echo "p2=$P2" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          {
            echo "## 🧭 UX-Gap PR Gate"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| P0 | $P0 |"
            echo "| P1 | $P1 |"
            echo "| P2 | $P2 |"
            echo ""
            echo "Sources: static-surface-scan + pre-customer-reality fixtures."
            echo "DB entry-fallback source is skipped on PRs (no PG creds)."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$TOTAL" -gt 0 ]; then
            echo "::error::UX-Gap PR Gate failed — P0=$P0 P1=$P1 P2=$P2 (must all be 0)"
            echo ""
            echo "Top findings:"
            node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT','utf8'));r.findings.slice(0,20).forEach(f=>console.log(' -',f.severity,f.surface||f.source,'→',(f.recommended_action||f.detail||'').slice(0,160)))"
            exit 1
          fi
          echo "✅ P0=P1=P2=0"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-gap-report-${{ github.run_id }}
          path: |
            ux-gap-report.json
            reality-results/findings/
          retention-days: 14

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const p = `${process.env.GITHUB_WORKSPACE}/ux-gap-report.json`;
            if (!fs.existsSync(p)) return;
            const r = JSON.parse(fs.readFileSync(p, 'utf8'));
            const s = r.summary.by_severity;
            const top = r.findings.slice(0, 10)
              .map(f => `- **${f.severity}** \`${f.surface || f.source}\` — ${(f.recommended_action || f.detail || '').slice(0, 200)}`)
              .join('\n') || '_(none)_';
            const body = [
              '## ❌ UX-Gap PR Gate failed',
              '',
              '| Severity | Count |',
              '|----------|-------|',
              `| P0 | ${s.P0} |`,
              `| P1 | ${s.P1} |`,
              `| P2 | ${s.P2} |`,
              '',
              'PR-Gate requires **P0 = P1 = P2 = 0** across static-surface-scan + pre-customer-reality fixtures.',
              '',
              '### Top findings',
              top,
              '',
              '_See workflow run for full `ux-gap-report.json` artifact._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('UX-Gap PR Gate failed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
