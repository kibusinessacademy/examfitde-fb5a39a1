name: RLS Audit (warn-only)

on:
  workflow_dispatch:

permissions: read-all

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      # Phase 1: warn-only — no DB credentials needed; reuses last snapshot
      # committed under docs/security/rls-snapshot.json. Phase 2 (RATCHET)
      # will add a read-only psql connection step.
      - name: Run RLS audit
        env:
          RLS_AUDIT_RATCHET: ${{ github.event.inputs.ratchet == 'true' && '1' || '' }}
        run: node scripts/security/rls-audit.mjs
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-audit-report
          path: docs/security/rls-audit-report.md
