name: qa-pins-validation

on:
  pull_request:
    paths:
      - 'scripts/guards/qa-pins-validation.mjs'
      - '.github/workflows/qa-pins-validation.yml'
      - '.github/workflows/learner-progress-persistence.yml'
  schedule:
    # Daily — catches data drift even when no PR touches the spec.
    - cron: '11 4 * * *'
  workflow_dispatch:

permissions: read-all

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 5
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
      E2E_QA_COURSE_ID: ${{ secrets.E2E_QA_COURSE_ID }}
      E2E_QA_LESSON_ID: ${{ secrets.E2E_QA_LESSON_ID }}
      E2E_QA_ALLACCESS_EMAIL: ${{ secrets.E2E_QA_ALLACCESS_EMAIL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
        with:
          required: VITE_SUPABASE_PUBLISHABLE_KEY VITE_SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: node scripts/guards/qa-pins-validation.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-pins-validation
          path: qa-pins-validation.json
          retention-days: 14
