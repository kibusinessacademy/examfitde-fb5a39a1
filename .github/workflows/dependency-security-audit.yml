name: Dependency & Security Audit

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          npm audit --json > audit-report.json 2>&1 || true
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-report.json)
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "📊 Vulnerabilities: critical=$CRITICAL, high=$HIGH"

      - name: Create issue on critical findings
        if: steps.audit.outputs.critical > 0 || steps.audit.outputs.high > 0
        uses: actions/github-script@v7
        with:
          script: |
            const critical = ${{ steps.audit.outputs.critical }};
            const high = ${{ steps.audit.outputs.high }};
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Security: ${critical} critical, ${high} high vulnerabilities`,
              body: `## Automated Security Audit\n\nFound **${critical} critical** and **${high} high** severity vulnerabilities.\n\nRun \`npm audit\` locally for details.\n\n_Generated by Dependency & Security Audit workflow_`,
              labels: ['security', 'automated']
            });

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Analyze bundle
        run: |
          echo "## 📦 Bundle Analysis" > bundle-report.md
          echo "" >> bundle-report.md
          echo "| File | Size |" >> bundle-report.md
          echo "|------|------|" >> bundle-report.md
          find dist/assets -name "*.js" -o -name "*.css" | sort | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "| $(basename $f) | $SIZE |" >> bundle-report.md
          done
          TOTAL=$(du -sh dist/ | cut -f1)
          echo "" >> bundle-report.md
          echo "**Total: $TOTAL**" >> bundle-report.md
          cat bundle-report.md

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: bundle-report.md
          retention-days: 30

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Install Lighthouse
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
        run: |
          lhci autorun --collect.staticDistDir=./dist --collect.url=/ --upload.target=filesystem --upload.outputDir=./lhci-report || true

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lhci-report
          retention-days: 30
