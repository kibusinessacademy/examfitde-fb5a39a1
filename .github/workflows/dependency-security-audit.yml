name: Dependency & Security Audit

on:
  schedule:
    - cron: "33 4 * * 1" # weekly Monday 04:33 UTC
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  audit:
    timeout-minutes: 15
    name: NPM Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: npm audit (high)
        run: npm run ci:audit

  bundle:
    timeout-minutes: 15
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build & measure
        run: |
          npm run build
          echo "## 📦 Bundle Analysis" > bundle-report.md
          echo "" >> bundle-report.md
          echo "| File | Size |" >> bundle-report.md
          echo "|------|------|" >> bundle-report.md
          find dist/assets -name "*.js" -o -name "*.css" | sort | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "| $(basename $f) | $SIZE |" >> bundle-report.md
          done
          TOTAL=$(du -sh dist/ | cut -f1)
          echo "" >> bundle-report.md
          echo "**Total: $TOTAL**" >> bundle-report.md
          cat bundle-report.md

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: bundle-report.md
          retention-days: 30
