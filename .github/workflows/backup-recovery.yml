name: Backup & Recovery Automation

on:
  schedule:
    # Critical tier: every 4 hours
    - cron: "0 */4 * * *"
    # Daily tier: 03:00 UTC
    - cron: "0 3 * * *"
    # Weekly tier: Sunday 04:00 UTC
    - cron: "0 4 * * 0"
    # Storage sync: daily 03:30 UTC
    - cron: "30 3 * * *"
    # Verify: daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - backup-critical
          - backup-daily
          - backup-weekly
          - storage-sync
          - verify-yesterday
          - verify-spot-check

jobs:
  determine-action:
    name: Determine Action
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.decide.outputs.action }}
    steps:
      - name: Decide action
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            case "$CRON" in
              "0 */4 * * *")  echo "action=backup-critical" >> $GITHUB_OUTPUT ;;
              "0 3 * * *")    echo "action=backup-daily" >> $GITHUB_OUTPUT ;;
              "0 4 * * 0")    echo "action=backup-weekly" >> $GITHUB_OUTPUT ;;
              "30 3 * * *")   echo "action=storage-sync" >> $GITHUB_OUTPUT ;;
              "0 6 * * *")    echo "action=verify-yesterday" >> $GITHUB_OUTPUT ;;
              *)              echo "action=backup-daily" >> $GITHUB_OUTPUT ;;
            esac
          fi

  run-backup:
    name: Run DB Backup
    needs: determine-action
    if: startsWith(needs.determine-action.outputs.action, 'backup-')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backup
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          BACKUP_JOB_SECRET: ${{ secrets.BACKUP_JOB_SECRET }}
        run: |
          ACTION="${{ needs.determine-action.outputs.action }}"
          TIER="${ACTION#backup-}"

          echo "🗄️ Running $TIER backup..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$SUPABASE_URL/functions/v1/db-backup-snapshot" \
            -H "Content-Type: application/json" \
            -H "x-backup-job-secret: $BACKUP_JOB_SECRET" \
            -d "{\"tier\":\"$TIER\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Backup failed with HTTP $HTTP_CODE"
            exit 1
          fi

          OK=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('ok',False))" 2>/dev/null || echo "False")
          if [ "$OK" != "True" ]; then
            echo "⚠️ Backup completed with errors"
            exit 1
          fi

          echo "✅ $TIER backup completed"

  run-storage-sync:
    name: Run Storage Sync
    needs: determine-action
    if: needs.determine-action.outputs.action == 'storage-sync'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger storage sync
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          BACKUP_JOB_SECRET: ${{ secrets.BACKUP_JOB_SECRET }}
        run: |
          echo "📦 Running storage sync..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$SUPABASE_URL/functions/v1/storage-backup-sync" \
            -H "Content-Type: application/json" \
            -H "x-backup-job-secret: $BACKUP_JOB_SECRET" \
            -d "{}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Storage sync failed"
            exit 1
          fi

          echo "✅ Storage sync completed"

  run-verify:
    name: Verify Backup
    needs: determine-action
    if: startsWith(needs.determine-action.outputs.action, 'verify-')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger verification
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          BACKUP_JOB_SECRET: ${{ secrets.BACKUP_JOB_SECRET }}
        run: |
          ACTION="${{ needs.determine-action.outputs.action }}"
          SPOT_CHECK="false"
          if [ "$ACTION" = "verify-spot-check" ]; then
            SPOT_CHECK="true"
          fi

          echo "🔍 Running backup verification (spot_check=$SPOT_CHECK)..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$SUPABASE_URL/functions/v1/verify-backup" \
            -H "Content-Type: application/json" \
            -H "x-backup-job-secret: $BACKUP_JOB_SECRET" \
            -d "{\"spot_check\": $SPOT_CHECK}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          FAILED=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('integrity_failed',0))" 2>/dev/null || echo "0")
          if [ "$FAILED" != "0" ]; then
            echo "❌ Verification: $FAILED integrity failure(s)"
            exit 1
          fi

          echo "✅ Backup verification passed"

  alert-on-failure:
    name: Alert on Failure
    needs: [run-backup, run-storage-sync, run-verify]
    if: always() && (needs.run-backup.result == 'failure' || needs.run-storage-sync.result == 'failure' || needs.run-verify.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Create issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: "Backup & Recovery"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -f scripts/ci/issue-on-fail.mjs ]; then
            node scripts/ci/issue-on-fail.mjs
          else
            echo "🚨 Backup/Recovery failed — see $RUN_URL"
          fi
