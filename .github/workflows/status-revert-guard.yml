name: status-revert-guard

on:
  pull_request:
    paths:
      - 'supabase/functions/**'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/status-revert-guard.yml'
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node scripts/guards/status-revert-guard.mjs
