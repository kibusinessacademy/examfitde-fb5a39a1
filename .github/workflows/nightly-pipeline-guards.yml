name: Nightly Pipeline Guards

on:
  workflow_dispatch:

permissions: read-all

jobs:
  pipeline-guards:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL

      - name: Call ops-nightly-guards edge function
        id: guards
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing required secrets (SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_ANON_KEY)"
            exit 1
          fi

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            "${SUPABASE_URL}/functions/v1/ops-nightly-guards" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "x-job-runner-key: ${SUPABASE_SERVICE_ROLE_KEY}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          # Extract metrics
          DONE_NOT_OK=$(echo "$BODY" | jq -r '.done_but_not_ok // 0')
          QUEUED_STALE=$(echo "$BODY" | jq -r '.queued_with_stale_meta // 0')
          BUILDING_NO_START=$(echo "$BODY" | jq -r '.building_done_without_started_at // 0')
          HOLLOW_PUB=$(echo "$BODY" | jq -r '.hollow_published // 0')
          QUARANTINED=$(echo "$BODY" | jq -r '.quarantined_ids // []')
          ALL_CLEAR=$(echo "$BODY" | jq -r '.all_clear // false')

          echo "done_but_not_ok=$DONE_NOT_OK" >> $GITHUB_OUTPUT
          echo "queued_with_stale_meta=$QUEUED_STALE" >> $GITHUB_OUTPUT
          echo "building_done_without_started_at=$BUILDING_NO_START" >> $GITHUB_OUTPUT
          echo "hollow_published=$HOLLOW_PUB" >> $GITHUB_OUTPUT

          echo "## Pipeline Guard Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| done_but_not_ok | $DONE_NOT_OK | $([ "$DONE_NOT_OK" = "0" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| queued_with_stale_meta | $QUEUED_STALE | $([ "$QUEUED_STALE" = "0" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| building_done_without_started_at | $BUILDING_NO_START | $([ "$BUILDING_NO_START" = "0" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| hollow_published (auto-quarantined) | $HOLLOW_PUB | $([ "$HOLLOW_PUB" = "0" ] && echo '✅' || echo '🔴 QUARANTINED') |" >> $GITHUB_STEP_SUMMARY

          if [ "$HOLLOW_PUB" != "0" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚠️ Auto-Quarantined Packages" >> $GITHUB_STEP_SUMMARY
            echo "$QUARANTINED" | jq -r '.[]' 2>/dev/null | while read pid; do
              echo "- \`$pid\`" >> $GITHUB_STEP_SUMMARY
            done
          fi

          if [ "$ALL_CLEAR" != "true" ]; then
            echo "::error::Pipeline guardrails fired — see details above"
            exit 2
          fi

      - name: Create or update issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🚨 Nightly Pipeline Guards failed";
            const doneNotOk = "${{ steps.guards.outputs.done_but_not_ok }}";
            const queuedStale = "${{ steps.guards.outputs.queued_with_stale_meta }}";
            const buildingNoStart = "${{ steps.guards.outputs.building_done_without_started_at }}";
            const hollowPub = "${{ steps.guards.outputs.hollow_published }}";

            const body = `## Pipeline Guardrail Violations Detected

            | Metric | Count |
            |--------|-------|
            | done_but_not_ok | ${doneNotOk} |
            | queued_with_stale_meta | ${queuedStale} |
            | building_done_without_started_at | ${buildingNoStart} |
            | hollow_published (auto-quarantined) | ${hollowPub} |

            **Action required:** Run the verification SQL and inspect recent runner changes.

            ${hollowPub !== "0" ? "⚠️ **Hollow published packages were auto-quarantined.** Check \`ops_guardrail_events\` for details." : ""}

            _Auto-generated by nightly-pipeline-guards workflow_`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "ops,guardrail",
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["ops", "guardrail"],
              });
            }
