name: Keyword Graph Sync Guard

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/keyword-graph-sync-guard.mjs'
      - '.github/workflows/keyword-graph-sync-guard.yml'
  schedule:
    - cron: '40 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sync-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run keyword graph sync guard
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/guards/keyword-graph-sync-guard.mjs

      - name: Upload sync report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keyword-graph-sync-report
          path: |
            keyword-graph-sync-report.json
            keyword-graph-sync-report.md

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('keyword-graph-sync-report.md')) return;
            const body = fs.readFileSync('keyword-graph-sync-report.md', 'utf8');
            const marker = '<!-- keyword-graph-sync-guard -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const finalBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: finalBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: finalBody });
            }
