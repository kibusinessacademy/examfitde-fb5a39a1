name: Keyword Graph Sync Guard

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/keyword-graph-sync-guard.mjs'
      - '.github/workflows/keyword-graph-sync-guard.yml'
  schedule:
    - cron: '40 6 * * *'
  workflow_dispatch:

jobs:
  sync-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run keyword graph sync guard
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/guards/keyword-graph-sync-guard.mjs
