name: Notification Policy Contract Guard

on:
  pull_request:
    paths:
      - 'src/**'
      - 'supabase/functions/**'
      - 'docs/contracts/notification-policy-contract.md'
      - 'scripts/guards/notification-policy-contract-guard.mjs'
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24' }
      - run: node scripts/guards/notification-policy-contract-guard.mjs
