name: Notification Policy Contract Guard

on:
  workflow_dispatch:

permissions: read-all

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24' }
      - run: node scripts/guards/notification-policy-contract-guard.mjs
