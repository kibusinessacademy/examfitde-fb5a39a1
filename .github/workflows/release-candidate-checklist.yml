name: Release Candidate Checklist

# Runs the three release gates (build, typecheck, test) on every PR and on
# manual dispatch, then publishes a formatted Markdown artifact summarising
# the results — the "release evidence" companion to ux-gap-pr-gate.yml.
#
# SSOT for RC GREEN:
#   - npm run build        (vite build)
#   - npm run ci:typecheck (tsc --noEmit)
#   - npx vitest run       (full unit/regression suite)
#
# The job never short-circuits: each step is recorded individually so the
# Markdown report shows the true state of all three gates, even when one
# fails. The final step hard-fails the job if ANY gate is red.

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - ".github/workflows/release-candidate-checklist.yml"
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: rc-checklist-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  checklist:
    name: RC Checklist (build · typecheck · test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Verify Node.js 24
        run: |
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi

      - name: Install dependencies
        id: install
        run: npm ci --legacy-peer-deps

      - name: Prepare evidence dir
        run: mkdir -p rc-evidence

      # ── Gate 1: Build ────────────────────────────────────────────────
      - name: Build (vite build)
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build 2>&1 | tee rc-evidence/build.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # ── Gate 2: Typecheck ────────────────────────────────────────────
      - name: Typecheck (tsc --noEmit)
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run ci:typecheck 2>&1 | tee rc-evidence/typecheck.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # ── Gate 3: Test ─────────────────────────────────────────────────
      - name: Test (vitest run)
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          npx vitest run --reporter=verbose 2>&1 | tee rc-evidence/test.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # ── Render the Markdown evidence artifact ────────────────────────
      - name: Compose Release Evidence (Markdown)
        if: always()
        id: compose
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          GH_SHA: ${{ github.sha }}
          GH_REF: ${{ github.ref }}
          GH_ACTOR: ${{ github.actor }}
          GH_EVENT: ${{ github.event_name }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const icon = (o) => o === 'success' ? '✅' : o === 'skipped' ? '⏭️' : '❌';
          const label = (o) => o === 'success' ? 'PASS' : o === 'skipped' ? 'SKIPPED' : 'FAIL';

          const gates = [
            { key: 'build',     name: 'pnpm build',      cmd: 'vite build',    outcome: process.env.BUILD_OUTCOME,     log: 'rc-evidence/build.log' },
            { key: 'typecheck', name: 'pnpm typecheck',  cmd: 'tsc --noEmit',  outcome: process.env.TYPECHECK_OUTCOME, log: 'rc-evidence/typecheck.log' },
            { key: 'test',      name: 'pnpm test',       cmd: 'vitest run',    outcome: process.env.TEST_OUTCOME,      log: 'rc-evidence/test.log' },
          ];

          const tail = (p, n = 40) => {
            try {
              const lines = fs.readFileSync(p, 'utf8').split('\n');
              return lines.slice(-n).join('\n').trim();
            } catch { return '(no log captured)'; }
          };

          const allPass = gates.every(g => g.outcome === 'success');
          const verdict = allPass ? '🟢 **RELEASE CANDIDATE — GREEN**'
                                  : '🔴 **RELEASE CANDIDATE — BLOCKED**';

          const lines = [];
          lines.push('# Release Evidence');
          lines.push('');
          lines.push(verdict);
          lines.push('');
          lines.push('| Field | Value |');
          lines.push('|---|---|');
          lines.push(`| Commit | \`${process.env.GH_SHA}\` |`);
          lines.push(`| Ref | \`${process.env.GH_REF}\` |`);
          lines.push(`| Actor | ${process.env.GH_ACTOR} |`);
          lines.push(`| Event | ${process.env.GH_EVENT} |`);
          lines.push(`| Run | ${process.env.GH_RUN_URL} |`);
          lines.push(`| Generated | ${new Date().toISOString()} |`);
          lines.push('');
          lines.push('## Release Checklist');
          lines.push('');
          lines.push('| Gate | Command | Result |');
          lines.push('|---|---|---|');
          for (const g of gates) {
            lines.push(`| ${g.name} | \`${g.cmd}\` | ${icon(g.outcome)} ${label(g.outcome)} |`);
          }
          lines.push('');
          lines.push('## Gate Details');
          for (const g of gates) {
            lines.push('');
            lines.push(`### ${icon(g.outcome)} ${g.name} — ${label(g.outcome)}`);
            lines.push('');
            lines.push('<details><summary>Last 40 log lines</summary>');
            lines.push('');
            lines.push('```');
            lines.push(tail(g.log));
            lines.push('```');
            lines.push('');
            lines.push('</details>');
          }
          lines.push('');
          lines.push('## Watchpoints (post-merge)');
          lines.push('');
          lines.push('- **Watchpoint A** — `pre-customer-reality-daily.yml` must stay P0=P1=P2=0.');
          lines.push('- **Watchpoint B** — `customer-reality-gate.yml` must stay ≥10/12 journeys PASS.');
          lines.push('- **Watchpoint C** — Live production reality on `berufos.com` for `/`, `/berufe`, `/preise` (cold-load == post-hydration).');
          lines.push('');

          const md = lines.join('\n');
          fs.writeFileSync('rc-evidence/release-evidence.md', md);
          fs.writeFileSync(process.env.GITHUB_STEP_SUMMARY, md, { flag: 'a' });
          fs.writeFileSync(process.env.GITHUB_OUTPUT, `all_pass=${allPass}\n`, { flag: 'a' });
          console.log(md);
          NODE

      - name: Upload Release Evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.run_id }}
          path: rc-evidence/
          retention-days: 30

      - name: Comment PR with Release Evidence
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const p = 'rc-evidence/release-evidence.md';
            if (!fs.existsSync(p)) return;
            const body = fs.readFileSync(p, 'utf8');
            const marker = '<!-- rc-release-evidence -->';
            const finalBody = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: finalBody,
              });
            }

      - name: Enforce RC GREEN
        if: always()
        run: |
          BUILD="${{ steps.build.outcome }}"
          TYPECHECK="${{ steps.typecheck.outcome }}"
          TEST="${{ steps.test.outcome }}"
          echo "build=$BUILD typecheck=$TYPECHECK test=$TEST"
          if [ "$BUILD" = "success" ] && [ "$TYPECHECK" = "success" ] && [ "$TEST" = "success" ]; then
            echo "✅ RELEASE CANDIDATE — GREEN"
            exit 0
          fi
          echo "::error::RC Checklist failed — build=$BUILD typecheck=$TYPECHECK test=$TEST"
          exit 1
