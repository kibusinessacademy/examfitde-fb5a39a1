name: dead-column-audit

on:
  pull_request:
    paths:
      - "supabase/**"
      - "src/**"
      - "scripts/dead-column-*.mjs"
      - "scripts/dead-column-candidates.json"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dead-column-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep
      - name: Run dead-column audit dry
        run: node scripts/dead-column-audit.mjs --dry
