name: Canonical Identity Contract Guard

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'scripts/guards/canonical-identity-contract-guard.mjs'
      - '.github/workflows/canonical-identity-guard.yml'
  schedule:
    # Daily 06:30 UTC — beobachtet Drift im laufenden Betrieb
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  identity-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Canonical Identity Guard (warn-only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MODE: warn
        run: node scripts/guards/canonical-identity-contract-guard.mjs
