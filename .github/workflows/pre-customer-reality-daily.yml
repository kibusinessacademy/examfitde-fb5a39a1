name: Pre-Customer Reality Daily QA

# Täglich automatisch + manuell. Misst Pre-Login-Funnel:
# Visitor → Beruf → Kurs → Preis → CTA → Checkout-Surface.
on:
  schedule:
    - cron: '37 6 * * *' # 06:37 UTC (20min nach learner-reality)
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override base URL (default = REALITY_BASE_URL secret oder preview)'
        required: false
        default: ''

permissions:
  contents: read
  issues: write   # Health-Check Alert opens/comments the daily UX-Gap Health issue

concurrency:
  group: pre-customer-reality-daily
  cancel-in-progress: false

jobs:
  reality:
    name: Pre-Customer Funnel Reality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # P0.1 Domain-Drift-Fix (2026-06-05): Default = berufos.com (Authority-SSOT).
      # Muss mit customer-reality-gate.yml + learner-reality-daily.yml identisch sein.
      REALITY_BASE_URL: ${{ github.event.inputs.base_url != '' && github.event.inputs.base_url || secrets.REALITY_BASE_URL || 'https://berufos.com' }}
      CHECKOUT_TEST_MODE: 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Cold-Load Verify (Early-Fail P0.1–P0.4)
        # Parity mit customer-reality-gate.yml: prüft /berufe, /preise und
        # ein /berufe/:slug pre-hydration auf sichtbaren Beruf/Preis/CTA-Text.
        # Verhindert, dass die Playwright-Suite bei trivialem Funnel-Bruch
        # erst nach 15min "leere Body"-Findings produziert.
        continue-on-error: true
        run: node scripts/cold-load-verify.mjs


      - name: Run pre-customer-reality suite
        id: pw
        continue-on-error: true
        run: bunx playwright test --project=pre-customer-reality

      - name: Aggregate + score
        id: agg
        continue-on-error: true
        run: node scripts/pre-customer-reality-aggregate.mjs

      - name: Render summary to job log
        if: always()
        run: |
          if [ -f reality-results/pre-customer-reality-report.md ]; then
            cat reality-results/pre-customer-reality-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Pre-Customer Reality QA" >> "$GITHUB_STEP_SUMMARY"
            echo "Aggregator produced no report — check Playwright artifact." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Bridge pre-customer P0-Findings (qa-state/pre-customer/*.json + findings/*.json)
      # into the same P18 ledger the learner gate already feeds. SSOT composite —
      # do NOT inline a parallel scan/POST here.
      - name: UX-Gap Scan + P18 Bridge Push (SSOT composite)
        id: uxbridge
        if: always()
        continue-on-error: true
        uses: ./.github/actions/ux-gap-push
        with:
          supabase_url:     ${{ secrets.SUPABASE_URL }}
          service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          pg_host:          ${{ secrets.SUPABASE_DB_HOST }}
          pg_user:          ${{ secrets.SUPABASE_DB_USER }}
          pg_password:      ${{ secrets.SUPABASE_DB_PASSWORD }}
          pg_database:      ${{ secrets.SUPABASE_DB_NAME }}
          pg_port:          ${{ secrets.SUPABASE_DB_PORT }}

      - name: Health-Check Alert (zero-findings / bridge failure)
        if: always()
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          REPORT_PRESENT:  ${{ steps.uxbridge.outputs.report_present }}
          TOTAL:           ${{ steps.uxbridge.outputs.total_findings }}
          P0:              ${{ steps.uxbridge.outputs.p0_findings }}
          BRIDGE_SKIPPED:  ${{ steps.uxbridge.outputs.bridge_skipped }}
          BRIDGE_FAILED:   ${{ steps.uxbridge.outputs.bridge_failed }}
          BRIDGE_RECORDED: ${{ steps.uxbridge.outputs.bridge_recorded }}
          HTTP_CODE:       ${{ steps.uxbridge.outputs.bridge_http_status }}
        run: |
          set +e
          REASONS=()
          [ "${REPORT_PRESENT:-false}" = "true" ] || REASONS+=("scanner produced no ux-gap-report.json")
          if [ "${REPORT_PRESENT:-false}" = "true" ] && [ "${TOTAL:-0}" = "0" ]; then
            REASONS+=("pre-customer scan returned 0 findings — sources may be dark")
          fi
          if [ "${BRIDGE_SKIPPED:-true}" = "false" ]; then
            [ "${HTTP_CODE:-0}" = "200" ] || REASONS+=("bridge HTTP ${HTTP_CODE} (expected 200)")
            if [ "${BRIDGE_FAILED:-0}" != "0" ] && [ "${BRIDGE_RECORDED:-0}" = "0" ]; then
              REASONS+=("bridge recorded 0 / failed ${BRIDGE_FAILED}")
            fi
          fi
          [ "${#REASONS[@]}" = "0" ] && { echo "UX-Gap health OK (pre-customer)"; exit 0; }

          DAY=$(date -u +%Y-%m-%d)
          BODY=$(printf '## Pre-Customer UX-Gap → P18 — daily health alert\n\n- run: %s\n- total: %s · p0: %s\n- bridge http: %s · recorded: %s · failed: %s\n\n### Reasons\n' \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${TOTAL}" "${P0}" "${HTTP_CODE}" "${BRIDGE_RECORDED}" "${BRIDGE_FAILED}")
          for R in "${REASONS[@]}"; do BODY="${BODY}- ${R}"$'\n'; done
          if command -v gh >/dev/null 2>&1; then
            EXISTING=$(gh issue list --search "UX-Gap Health daily ${DAY} in:title" --state open --json number --jq '.[0].number' 2>/dev/null)
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "$BODY" || true
            else
              gh issue create --title "UX-Gap Health daily ${DAY}" --label "ops,ux-gap,pre-customer" --body "$BODY" || true
            fi
          fi
          exit 1


      - name: Upload reality-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-customer-reality-${{ github.run_id }}
          path: |
            reality-results/
            playwright-report/
            test-results/
          retention-days: 14

      - name: Hard-fail on BLOCK
        if: always()
        run: |
          if [ ! -f reality-results/pre-customer-reality-results.json ]; then
            echo "::error::Aggregator did not produce results.json"
            exit 2
          fi
          STATUS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('reality-results/pre-customer-reality-results.json','utf8')).status)")
          TTC=$(node -e "const r=JSON.parse(require('fs').readFileSync('reality-results/pre-customer-reality-results.json','utf8'));console.log(r.time_to_course_ms ?? 'null')")
          echo "Status=$STATUS  TIME_TO_COURSE=${TTC}ms"
          if [ "$STATUS" = "BLOCK" ]; then exit 2; fi
          if [ "$STATUS" = "REVIEW" ]; then exit 1; fi
          exit 0
