name: ExamFit CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Show Node/NPM versions (debug)
        run: |
          node -v
          npm -v

      - name: List repo root (debug)
        run: ls -la

      - name: Install dependencies
        run: npm ci

      - name: Show package.json scripts (debug)
        run: node -e "console.log(require('./package.json').scripts || {})"

      - name: Build
        run: npm run build
