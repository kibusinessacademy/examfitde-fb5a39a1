name: Internal Link Hygiene Guard

on:
  pull_request:
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - 'scripts/guards/internal-link-hygiene-guard.mjs'
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Internal Link Hygiene Guard
        run: node scripts/guards/internal-link-hygiene-guard.mjs
