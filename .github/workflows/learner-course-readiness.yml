name: learner-course-readiness

on:
  workflow_dispatch:

permissions: read-all


jobs:
  readiness:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
        with:
          required: 'VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY'
      - name: Run readiness DB-guard
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          # --max-empty: tolerated empty published courses (ratchet down as content lands).
          # --max-drift: tolerated active+public-but-not-sellable products (sell-drift).
          #   Baseline 2026-06-25: 49 (Sell-Audit). Target: 0. Ratchet down per content wave.
          #   Drift gate is MANDATORY — added to block recurrence of pricing/sell-drift.
          node scripts/guards/learner-course-readiness.mjs --max-empty=30 --max-drift=49
