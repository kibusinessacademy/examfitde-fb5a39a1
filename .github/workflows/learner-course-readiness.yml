name: learner-course-readiness

on:
  pull_request:
    paths:
      - 'src/pages/CoursesPage.tsx'
      - 'src/pages/CourseDetailPage.tsx'
      - 'src/components/course/**'
      - 'src/components/lesson/**'
      - 'scripts/guards/learner-course-readiness.mjs'
      - '.github/workflows/learner-course-readiness.yml'
      - 'supabase/migrations/**'
  push:
    branches: [main]
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch: {}

permissions: read-all


jobs:
  readiness:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
        with:
          required: 'VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY'
      - name: Run readiness DB-guard
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          # Tolerated empty count starts at the historical baseline (34) and
          # ratchets down as content lands. Reduce manually after cleanup.
          node scripts/guards/learner-course-readiness.mjs --max-empty=30
