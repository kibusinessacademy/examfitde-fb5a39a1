name: SEO Cannibalization Guard
on:
  pull_request:
    paths:
      - 'src/pages/**'
      - 'supabase/migrations/**.sql'
      - 'scripts/guards/seo-cannibalization-guard.mjs'
  schedule:
    - cron: '0 6 * * *' # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'warn (default) or strict'
        type: choice
        options: [ warn, strict ]
        default: warn

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Keyword ownership scan (warn-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: VITE_SUPABASE_PUBLISHABLE_KEY VITE_SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run guard
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ "${{ inputs.mode }}" = "strict" ]; then
            node scripts/guards/seo-cannibalization-guard.mjs --strict
          else
            node scripts/guards/seo-cannibalization-guard.mjs
          fi
