name: Customer Reality Triage Loop

# Läuft nach learner-reality-daily UND pre-customer-reality-daily.
# Konsumiert deren Artifacts, klassifiziert Findings, vergleicht gegen
# letzte Baseline, öffnet GitHub Issues für jeden neuen P0, snapshotted
# Baseline nur wenn beide Runs RELEASE.
#
# Kein neues Feature — nur Reality → Finding → Fix-Queue → Regression.

on:
  workflow_run:
    workflows:
      - "Pre-Customer Reality Daily QA"
      - "Daily Learner Reality QA"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write   # für Baseline-Commit
  issues: write     # für P0-Issues
  actions: read     # Artifacts lesen

concurrency:
  group: customer-reality-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download latest learner-reality artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: learner-reality-daily.yml
          name_is_regexp: true
          name: ^learner-reality-.*
          path: reality-artifacts/learner
          if_no_artifact_found: warn

      - name: Download latest pre-customer artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: pre-customer-reality-daily.yml
          name_is_regexp: true
          name: ^pre-customer-reality-.*
          path: reality-artifacts/precustomer
          if_no_artifact_found: warn

      - name: Merge artifacts into reality-results/
        run: |
          mkdir -p reality-results/findings
          for src in reality-artifacts/learner reality-artifacts/precustomer; do
            if [ -d "$src/reality-results" ]; then
              cp -rn "$src/reality-results/." reality-results/ || true
            fi
            if [ -d "$src/reality-results/findings" ]; then
              cp -n "$src/reality-results/findings/"*.json reality-results/findings/ 2>/dev/null || true
            fi
          done
          ls -la reality-results/ || true
          echo "--- findings ---"
          ls reality-results/findings/ 2>/dev/null | wc -l || true

      - name: Run triage
        id: triage
        continue-on-error: true
        run: node scripts/customer-reality-triage.mjs

      - name: Render triage report to job summary
        if: always()
        run: |
          if [ -f reality-results/triage-report.md ]; then
            cat reality-results/triage-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Customer-Reality Triage" >> "$GITHUB_STEP_SUMMARY"
            echo "Triage produced no report — check previous step." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload triage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-reality-triage-${{ github.run_id }}
          path: |
            reality-results/triage.json
            reality-results/triage-report.md
            reality-results/github-issues/
          retention-days: 30

      - name: Open / dedupe GitHub Issues for P0 + Regression findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'reality-results/github-issues';
            if (!fs.existsSync(dir)) { core.info('No issues queued.'); return; }
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            if (files.length === 0) { core.info('No issues queued.'); return; }

            // Open issues with `reality` label — match by fingerprint in body.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'reality',
              per_page: 100,
            });
            const openByFp = new Map();
            for (const i of existing) {
              const m = (i.body || '').match(/Fingerprint:\s*`([^`]+)`/);
              if (m) openByFp.set(m[1], i);
            }

            const labelColor = { p0: 'b60205', p1: 'd93f0b', p2: 'fbca04', regression: '5319e7', reality: '0e8a16' };
            let created = 0, updated = 0, skipped = 0;
            for (const f of files) {
              const stub = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              for (const lbl of stub.labels) {
                const color = labelColor[lbl] || labelColor[lbl.split(':')[0]] || 'ededed';
                try { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: lbl, color }); } catch {}
              }
              const dupe = openByFp.get(stub.fingerprint);
              if (dupe) {
                // Append a recurrence comment so we keep ETA + classification fresh
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: dupe.number,
                  body: `🔄 Recurrence ${new Date().toISOString()} — classification \`${stub.classification}\`, severity ${stub.severity}.`,
                });
                updated++;
                continue;
              }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: stub.title,
                body: stub.body,
                labels: stub.labels,
              });
              created++;
            }
            core.notice(`Reality-Triage: ${created} new · ${updated} recurrence comments · ${skipped} skipped.`);


      - name: Commit baseline + P0-D dashboard data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Always commit public dashboard data (history + latest snapshot) — P0-D feed
          [ -f public/reality/latest.json ] && git add public/reality/latest.json public/reality/history.json || true
          # Baseline only when RELEASE produced new file
          [ -f reality-baselines/last.json ] && git add reality-baselines/last.json || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(reality): triage snapshot + dashboard data [skip ci]"
            git push
          fi

      - name: Propagate triage exit status
        if: always()
        run: |
          if [ ! -f reality-results/triage.json ]; then
            echo "::error::Triage produced no output"
            exit 2
          fi
          OVERALL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('reality-results/triage.json','utf8')).overall)")
          echo "Overall=$OVERALL"
          if [ "$OVERALL" = "BLOCK" ]; then exit 2; fi
          if [ "$OVERALL" = "REVIEW" ]; then exit 1; fi
          exit 0
