name: Content Graph Orphan Guard (warn-only)

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/guards/content-graph-orphan-guard.mjs'
      - '.github/workflows/content-graph-orphan-guard.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  orphan-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run content graph orphan guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/guards/content-graph-orphan-guard.mjs
