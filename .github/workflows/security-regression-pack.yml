name: Security Regression Pack

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "scripts/security/**"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions: read-all

jobs:
  migration-rls-gate:
    timeout-minutes: 15
    name: Migration RLS Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Detect changed migrations
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- supabase/migrations/ | tr '\n' ',')
            echo "files=$FILES" >> $GITHUB_OUTPUT
          else
            echo "files=" >> $GITHUB_OUTPUT
          fi
      - name: Run Migration RLS Gate
        env:
          CHANGED_MIGRATION_FILES: ${{ steps.changes.outputs.files }}
        run: node scripts/security/migration-rls-gate.mjs

  view-exposure:
    timeout-minutes: 15
    name: View & Table Exposure Guard
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY ||
            secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
            VITE_SUPABASE_PUBLISHABLE_KEY
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Check required secrets
        id: secrets
        shell: bash
        run: |
          missing=0
          [ -z "${SUPABASE_URL:-}" ]              && { echo "❌ Missing SUPABASE_URL"; missing=1; }
          [ -z "${SUPABASE_ANON_KEY:-}" ]         && { echo "❌ Missing SUPABASE_ANON_KEY"; missing=1; }
          [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && { echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY"; missing=1; }
          if [ "$missing" -eq 1 ]; then
            if [ "$strict" = "true" ]; then echo "::error::Missing secrets on protected run."; exit 1; fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::View Exposure skipped — secrets missing."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run exposure guard
        if: steps.secrets.outputs.skip != 'true'
        run: node scripts/security/view-exposure-guard.mjs

  exam-integrity:
    timeout-minutes: 15
    name: Exam Integrity Check
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY ||
            secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
            VITE_SUPABASE_PUBLISHABLE_KEY
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Check required secrets
        id: secrets
        shell: bash
        run: |
          missing=0
          [ -z "${SUPABASE_URL:-}" ]              && { echo "❌ Missing SUPABASE_URL"; missing=1; }
          [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && { echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY"; missing=1; }
          if [ "$missing" -eq 1 ]; then
            if [ "$strict" = "true" ]; then echo "::error::Missing secrets on protected run."; exit 1; fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Exam Integrity skipped — secrets missing."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run exam integrity checks
        if: steps.secrets.outputs.skip != 'true'
        run: node scripts/security/exam-integrity-check.mjs

  rls-smoke:
    timeout-minutes: 15
    name: RLS Smoke (expanded)
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY ||
            secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Check required secrets
        id: secrets
        shell: bash
        run: |
          missing=0
          [ -z "${SUPABASE_URL:-}" ]      && { echo "❌ Missing SUPABASE_URL"; missing=1; }
          [ -z "${SUPABASE_ANON_KEY:-}" ] && { echo "❌ Missing SUPABASE_ANON_KEY"; missing=1; }
          if [ "$missing" -eq 1 ]; then
            if [ "$strict" = "true" ]; then echo "::error::Missing secrets on protected run."; exit 1; fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::RLS Smoke skipped — secrets missing."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run expanded RLS smoke
        if: steps.secrets.outputs.skip != 'true'
        run: node scripts/rls-security-check.mjs

  alert-on-failure:
    timeout-minutes: 15
    name: Alert on Failure
    needs: [ migration-rls-gate, view-exposure, exam-integrity, rls-smoke ]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Create GitHub Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: "Security Regression Pack"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
            github.run_id }}
        run: |
          if [ -f scripts/ci/issue-on-fail.mjs ]; then
            node scripts/ci/issue-on-fail.mjs
          else
            echo "🚫 Security Regression Pack failed — see $RUN_URL"
          fi
