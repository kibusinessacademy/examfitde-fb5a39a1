name: SQL Discipline Guard

on:
  workflow_dispatch:

jobs:
  guard:
    name: Hard-Block SQL Anti-Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run SQL discipline guard (hard-block)
        run: node scripts/guards/sql-discipline-guard.mjs

      - name: New-files-only rg sanity sweep (defense in depth)
        if: github.event_name == 'pull_request'
        run: |
          set -e
          echo "::group::rg sweep on PR-changed files only"
          # Nur in geänderten Files prüfen — Baseline bleibt unangetastet.
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- \
            'supabase/migrations/**' 'supabase/functions/**' 'src/**/*.ts' 'src/**/*.tsx' || true)
          if [ -z "$CHANGED" ]; then
            echo "No relevant files changed."
            exit 0
          fi
          MATCHES=$(echo "$CHANGED" | xargs -r grep -InE "COUNT\(\)|SELECT[[:space:]]+INTO|RETURNING[[:space:]]+INTO" 2>/dev/null \
            | grep -v "lovable-sql-allow" \
            | grep -v ":[[:space:]]*--" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Forbidden patterns in changed files:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ rg sweep clean on changed files"
          echo "::endgroup::"
