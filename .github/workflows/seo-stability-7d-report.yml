name: Trigger-Gate 7-Day Stability Report

# Aggregiert die letzten 7 Tage `post-deploy-go-status` Runs
# (GO/BLOCKED Verdicts via Artifact-Naming) und postet ein Markdown-Summary.
#
# Trigger:
#   - schedule (täglich 06:30 UTC)
#   - workflow_dispatch

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Window in hours (default 168 = 7d)"
        required: false
        default: "168"

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Run stability report
        id: report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '168' }}
          HOST: "https://examfit.de"
        continue-on-error: true
        run: node scripts/seo/stability-7d-report.mjs | tee report.md

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trigger-gate-stability-7d-${{ github.run_id }}
          path: report.md
          retention-days: 90

      - name: Open issue if RED
        if: steps.report.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CUTOVER] Trigger-Gate 7d Stability RED`,
              labels: ['cutover', 'stability', 'auto'],
              body,
            });
