name: Edge CI (Syntax + Security Guards)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  edge-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: "1.41.3"

      - name: Edge Functions - Deno check (syntax + types)
        run: |
          deno --version
          deno check supabase/functions/**/index.ts supabase/functions/_shared/*.ts

      - name: Edge Functions - Deno lint (no-redeclare safety)
        run: |
          deno lint supabase/functions/**/index.ts supabase/functions/_shared/*.ts

      - name: Security + Drift guards
        run: |
          deno run -A scripts/edge-guards.ts

      - name: ESM.SH Guard — block unstable esm.sh imports
        run: |
          HITS=$(grep -rn 'esm\.sh/@supabase\|esm\.sh/stripe\|esm\.sh/jszip' supabase/functions/ --include='*.ts' || true)
          if [ -n "$HITS" ]; then
            echo "❌ ESM.SH VIOLATION: Use npm: specifier instead of esm.sh:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No esm.sh imports for critical packages"

      - name: Deno.land/std Guard — block legacy serve imports
        run: |
          HITS=$(grep -rn 'deno\.land/std.*http/server\.ts' supabase/functions/ --include='*.ts' || true)
          if [ -n "$HITS" ]; then
            echo "❌ DENO.LAND/STD VIOLATION: Use built-in Deno.serve() instead:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No deno.land/std server imports"

      - name: SSOT Guard — block direct package_steps done writes
        run: |
          # Only _shared/steps.ts may write status='done' to package_steps
          HITS=$(grep -rn 'package_steps' supabase/functions/ \
            --include='*.ts' \
            -l | grep -v '_shared/steps.ts' | while read f; do
              grep -Pn "status.*['\"]done['\"]" "$f" 2>/dev/null || true
            done)
          if [ -n "$HITS" ]; then
            echo "❌ SSOT VIOLATION: Direct package_steps status='done' writes found outside _shared/steps.ts:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No direct package_steps done writes outside SSOT"

      - name: No-Gemini-in-Learning-Content Guard
        run: |
          node scripts/guards/no-gemini-learning-content-guard.mjs

      - name: No-Raw-Step-Insert Guard
        run: |
          node scripts/guards/no-raw-step-insert-guard.mjs

      - name: No-Direct-LLM-Fetch Guard
        run: |
          node scripts/guards/no-direct-llm-fetch-guard.mjs

      - name: Handler-Registry Parity Guard
        run: |
          node scripts/guards/handler-registry-parity-guard.mjs

      - name: Success summary
        run: |
          echo "✅ Edge CI passed: deno check + deno lint + edge guards + SSOT guards + model guards + LLM fetch guards + handler parity"
