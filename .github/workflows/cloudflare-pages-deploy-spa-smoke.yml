name: Cloudflare Pages Deploy + SPA Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: examfit
          directory: dist
          branch: main

      - name: SPA Smoke pages.dev
        run: |
          for url in \
            "https://examfit.pages.dev/" \
            "https://examfit.pages.dev/pruefungstraining-azubis" \
            "https://examfit.pages.dev/pruefungstraining-betriebe" \
            "https://examfit.pages.dev/pruefungstraining-institutionen"
          do
            echo "Checking $url"
            code=$(curl -L -s -o /tmp/page.html -w "%{http_code}" "$url")
            test "$code" = "200"
            grep -qi "<div id=\"root\"" /tmp/page.html || grep -qi "<script" /tmp/page.html
          done

      - name: SPA Smoke production domain
        continue-on-error: true
        run: |
          for url in \
            "https://examfit.de/" \
            "https://examfit.de/pruefungstraining-azubis"
          do
            echo "Checking $url"
            curl -L -f -s "$url" > /dev/null
          done
