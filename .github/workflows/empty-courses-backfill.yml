name: empty-courses-backfill

on:
  workflow_dispatch:

permissions: read-all

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BACKFILL_LIMIT: ${{ inputs.limit }}
      BACKFILL_DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY VITE_SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run skeleton backfill
        run: node scripts/guards/empty-courses-backfill-run.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: empty-courses-backfill
          path: |
            empty-courses-backfill.json
            empty-courses-backfill.md
          retention-days: 30
