name: mobile-banner-cta-overlap

on:
  workflow_dispatch:

permissions: read-all

jobs:
  overlap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_TARGET: preview
      PREVIEW_URL: ${{ secrets.PREVIEW_URL || 'https://examfitde.lovable.app' }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Run mobile-overlap tests
        run: bunx playwright test --project=mobile-overlap
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mobile-overlap-report
          path: |
            playwright-report
            test-results
          retention-days: 7
