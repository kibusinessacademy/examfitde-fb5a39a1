name: Auth & Org Context E2E

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions: read-all

# Workflow-Level: pro Run einzigartig → keine Re-Runs cancellen sich gegenseitig.
concurrency:
  group: auth-org-e2e-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  auth-org-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Job-Level-Mutex: pro Org/Env nur EIN aktiver Auth-E2E-Run.
    # Nachfolgende Runs warten in der Queue statt parallel zu laufen
    # (Race-Conditions bei Seed/Login werden so verhindert).
    concurrency:
      group: >-
        auth-org-e2e-mutex-${{
          secrets.E2E_ORG_EMAIL || 'org@unternehmen.de'
        }}-${{
          secrets.E2E_BASE_URL || 'https://examfitde.lovable.app'
        }}
      cancel-in-progress: false

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://examfitde.lovable.app' }}
      E2E_LEARNER_EMAIL: ${{ secrets.E2E_LEARNER_EMAIL || 'learner@learner.de' }}
      E2E_LEARNER_PASSWORD: ${{ secrets.E2E_LEARNER_PASSWORD || 'ExamFit_Test_2026!' }}
      E2E_ORG_EMAIL: ${{ secrets.E2E_ORG_EMAIL || 'org@unternehmen.de' }}
      E2E_ORG_PASSWORD: ${{ secrets.E2E_ORG_PASSWORD || 'ExamFit_Test_2026!' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          missing=0
          for v in SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing secret $v"
              missing=1
            fi
          done
          exit $missing

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Seed Learner + Org test users
        run: node scripts/qa/seed-auth-test-users.mjs

      # Retry-Mechanismus: bis zu 2 Wiederholungen für flakige Tests
      # (Timing/Race-Conditions). Trace + Screenshot + Video werden
      # ab dem ersten Retry automatisch erfasst.
      - name: Run Auth & Org Context E2E (with retries + trace)
        env:
          PW_TEST_TRACE: 'on-first-retry'
          PW_TEST_SCREENSHOT: 'only-on-failure'
          PW_TEST_VIDEO: 'retain-on-failure'
        run: |
          npx playwright test tests/e2e/auth-org-context.spec.ts \
            --retries=2 \
            --reporter=line,html \
            --trace=on-first-retry \
            --output=test-results

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-org-e2e-report-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test-results (traces, screenshots, videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-org-e2e-artifacts-${{ github.run_attempt }}
          path: |
            test-results/**
            **/trace.zip
            **/*.png
            **/*.webm
          retention-days: 14
          if-no-files-found: ignore
