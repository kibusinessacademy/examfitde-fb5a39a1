name: Build-Integrity E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions: read-all

jobs:
  build-integrity-e2e:
    name: Build-Integrity E2E Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run admin_build_integrity_e2e gate
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          MAX_DATA_HOLES_PUBLISHED: "0"
          MAX_DATA_HOLES_BUILDING: "10"
          HARD_FAIL_ON_MISSING_STEPS: "1"
        run: node scripts/build-integrity-e2e-check.mjs
