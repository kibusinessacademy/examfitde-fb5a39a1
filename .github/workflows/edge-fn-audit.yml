name: edge-fn-audit

on:
  schedule:
    - cron: "30 4 * * *" # daily 04:30 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "supabase/functions/**"
      - "scripts/edge-fn-audit.mjs"

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep
      - name: Run audit (dry on PR, snapshot on cron/manual)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node scripts/edge-fn-audit.mjs --dry
          else
            node scripts/edge-fn-audit.mjs
          fi
