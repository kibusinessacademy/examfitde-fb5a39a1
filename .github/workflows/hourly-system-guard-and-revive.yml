name: Hourly System Guard + Revive

on:
  schedule:
    - cron: "7 * * * *" # hourly at :07
  workflow_dispatch: {}

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard-and-revive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Guard forbidden DB indexes (RPC)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euxo pipefail

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "::error::Missing SUPABASE_URL (or VITE_SUPABASE_URL) repo secret"
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Missing SUPABASE_SERVICE_ROLE_KEY repo secret"
            exit 1
          fi

          RESP=$(curl -sS -X POST "${SUPABASE_URL}/rest/v1/rpc/guard_forbidden_indexes" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "$RESP" | jq .

          VERDICT=$(echo "$RESP" | jq -r '.[0].verdict // "unknown"')
          if [ "$VERDICT" != "pass" ]; then
            echo "❌ Forbidden indexes found. Blocking."
            exit 1
          fi

          echo "✅ Forbidden index guard passed."

      - name: Auto-revive transient-exhausted lesson_generate_content jobs
        env:
          SUPABASE_EDGE_BASE_URL: ${{ secrets.SUPABASE_EDGE_BASE_URL }}
          EDGE_INTERNAL_SHARED_SECRET: ${{ secrets.EDGE_INTERNAL_SHARED_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_EDGE_BASE_URL:-}" ] || [ -z "${EDGE_INTERNAL_SHARED_SECRET:-}" ]; then
            echo "Missing SUPABASE_EDGE_BASE_URL or EDGE_INTERNAL_SHARED_SECRET secrets"
            exit 1
          fi

          RESP=$(curl -sS -X POST "${SUPABASE_EDGE_BASE_URL}/admin-revive-transient-exhausted" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${EDGE_INTERNAL_SHARED_SECRET}" \
            -d '{"window_hours": 6, "dry_run": false}')

          echo "$RESP" | jq .

          OK=$(echo "$RESP" | jq -r '.ok // false')
          if [ "$OK" != "true" ]; then
            echo "❌ Revive call failed"
            exit 1
          fi

          echo "✅ Revive completed."
