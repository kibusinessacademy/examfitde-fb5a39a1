name: badge-visual-regression

on:
  workflow_dispatch:

permissions: read-all


jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BASE_URL: ${{ secrets.STAGING_URL || 'https://examfitde.lovable.app' }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Run badge visual regression
        run: bunx playwright test tests/e2e/badge-visual.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: badge-visual-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
