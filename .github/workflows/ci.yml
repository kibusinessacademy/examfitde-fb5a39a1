name: CI

on:
  workflow_dispatch:

permissions: read-all

jobs:
  ssot-guard:
    timeout-minutes: 15
    name: SSOT Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: node scripts/ssot-guard.mjs

  typecheck-build:
    timeout-minutes: 15
    name: TypeScript + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  unit-tests:
    timeout-minutes: 15
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: npm ci --legacy-peer-deps
      - name: Run tests
        run: npx vitest run --reporter=verbose
      - name: OralExamTrainer ElevenLabs guard (explicit)
        run: |
          npx vitest run \
            src/test/oral-exam-trainer-no-elevenlabs.unit.test.ts \
            src/test/oral-voice-no-elevenlabs.test.ts \
            --reporter=verbose
      - name: ux-gap-scan hydration-drift regression (explicit)
        run: npx vitest run src/test/ux-gap-scan.regression.test.ts --reporter=verbose
      - name: Generate test summary
        if: always()
        run: |
          echo "## 🧪 Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Includes: Nightly Audit, Learner Golden Path, Admin Preview, Edge Contracts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎙️ OralExamTrainer ElevenLabs Guard" >> $GITHUB_STEP_SUMMARY
          echo "- \`src/test/oral-exam-trainer-no-elevenlabs.unit.test.ts\` — 4 assertions (substring, env var, line-by-line \`/elevenlabs/i\`, host/endpoint)" >> $GITHUB_STEP_SUMMARY
          echo "- \`src/test/oral-voice-no-elevenlabs.test.ts\` — 5 assertions (browser-native Web Speech API, no oral-voice-* bridge)" >> $GITHUB_STEP_SUMMARY

  bundle-size:
    timeout-minutes: 15
    name: Bundle Size Monitor
    needs: typecheck-build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Analyse bundle size
        id: size
        run: |
          TOTAL=$(du -sb dist | awk '{print $1}')
          TOTAL_KB=$((TOTAL / 1024))
          JS_SIZE=$(find dist -name '*.js' -exec du -cb {} + | tail -1 | awk '{print $1}')
          JS_KB=$((JS_SIZE / 1024))
          CSS_SIZE=$(find dist -name '*.css' -exec du -cb {} + | tail -1 | awk '{print $1}')
          CSS_KB=$((CSS_SIZE / 1024))
          echo "total_kb=$TOTAL_KB" >> $GITHUB_OUTPUT
          echo "js_kb=$JS_KB" >> $GITHUB_OUTPUT
          echo "css_kb=$CSS_KB" >> $GITHUB_OUTPUT
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total | ${TOTAL_KB} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| JS | ${JS_KB} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| CSS | ${CSS_KB} KB |" >> $GITHUB_STEP_SUMMARY
      - name: Comment PR with size
        uses: actions/github-script@v7
        with:
          script: |
            const totalKb = '${{ steps.size.outputs.total_kb }}';
            const jsKb = '${{ steps.size.outputs.js_kb }}';
            const cssKb = '${{ steps.size.outputs.css_kb }}';
            const body = `## 📦 Bundle Size Report\n| Asset | Size |\n|-------|------|\n| **Total** | ${totalKb} KB |\n| JS | ${jsKb} KB |\n| CSS | ${cssKb} KB |`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  lighthouse:
    timeout-minutes: 15
    name: Lighthouse CI
    needs: typecheck-build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .github/lighthouse/lighthouserc.json

  schema-drift:
    timeout-minutes: 15
    name: Schema Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Check schema drift
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/schema-drift-check.mjs

  security-audit:
    timeout-minutes: 15
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: npm ci --legacy-peer-deps
      - name: npm audit (critical + high)
        run: npm audit --audit-level=high || true
      - name: Report summary
        run: |
          echo "## 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --json 2>/dev/null | node -e "
            const data = require('fs').readFileSync('/dev/stdin','utf8');
            try {
              const r = JSON.parse(data);
              const v = r.metadata?.vulnerabilities || {};
              console.log('| Severity | Count |');
              console.log('|----------|-------|');
              for (const [k,c] of Object.entries(v)) console.log('| ' + k + ' | ' + c + ' |');
            } catch { console.log('No vulnerabilities found.'); }
          " >> $GITHUB_STEP_SUMMARY

  published-questions-smoke:
    timeout-minutes: 15
    name: Published Packages Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_URL
      - name: Check published packages have approved questions
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/smoke-published-approved.mjs
