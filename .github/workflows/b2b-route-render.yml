name: B2B Route Render Guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Blocking required status check: configure branch protection to require
# "b2b-route-render / e2e" before merging.
jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
      E2E_TARGET: preview
      PREVIEW_URL: ${{ secrets.PREVIEW_URL || 'https://examfitde.lovable.app' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run B2B route render tests
        run: npx playwright test --project=b2b-render

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-b2b-render
          path: |
            playwright-report
            test-results
          retention-days: 14
