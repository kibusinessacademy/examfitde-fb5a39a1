name: LXI Heal Smoke
on:
  workflow_dispatch:

permissions: read-all

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL || 'https://ubdvvvsiryenhrfmqsvw.supabase.co' }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - run: npm ci --legacy-peer-deps
      - name: Run LXI heal smoke
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL || 'https://ubdvvvsiryenhrfmqsvw.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LXI_SMOKE_LIVE: "0" # CI never mutates production
        run: node scripts/lxi-heal-smoke.mjs
