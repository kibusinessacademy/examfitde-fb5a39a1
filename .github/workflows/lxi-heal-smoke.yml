name: LXI Heal Smoke
on:
  schedule:
    - cron: "21 5 * * *"   # daily 05:21 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "supabase/migrations/**lxi*"
      - "supabase/migrations/**heal*"
      - "supabase/functions/admin-lxi-package-analyzer/**"
      - "scripts/lxi-heal-smoke.mjs"
      - ".github/workflows/lxi-heal-smoke.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci --no-audit --no-fund
      - name: Run LXI heal smoke
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LXI_SMOKE_LIVE: "0"   # CI never mutates production
        run: node scripts/lxi-heal-smoke.mjs
