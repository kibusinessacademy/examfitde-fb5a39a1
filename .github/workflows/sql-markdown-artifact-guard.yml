name: SQL Markdown-Artifact Guard
on:
  workflow_dispatch:

permissions: read-all

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Detect changed migrations
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=AM \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" \
              -- 'supabase/migrations/**.sql' | tr '\n' ',' | sed 's/,$//')
          else
            CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD \
              -- 'supabase/migrations/**.sql' | tr '\n' ',' | sed 's/,$//')
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
      - name: Run guard
        env:
          CHANGED_MIGRATION_FILES: ${{ steps.diff.outputs.changed }}
        run: node scripts/guards/sql-markdown-artifact-guard.mjs
