name: auto_heal_log Canonical Schema Guard

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  guard:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run guard (annotate + json)
        id: guard
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node scripts/guards/auto-heal-log-canonical-schema-guard.mjs --annotate --json > /tmp/guard.json
          # Re-emit annotations to logs (json mode swallows them); rerun without --json for annotations only:
          node scripts/guards/auto-heal-log-canonical-schema-guard.mjs --annotate || true

      - name: Generate migration runbook
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node scripts/ops/migration-runbook-generator.mjs --out=/tmp/runbook.md || echo "_(runbook unavailable — no live RPC access)_" > /tmp/runbook.md

      - name: Post PR review comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARD_JSON_PATH: /tmp/guard.json
          RUNBOOK_PATH: /tmp/runbook.md
        run: node scripts/ci/auto-heal-log-pr-comment.mjs

      - name: Fail if guard failed
        if: steps.guard.outcome == 'failure'
        run: |
          echo "❌ auto_heal_log canonical schema guard failed."
          exit 1
