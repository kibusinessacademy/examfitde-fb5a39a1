name: learner-progress-persistence

on:
  workflow_dispatch:

permissions: read-all

jobs:
  progress:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BASE_URL: ${{ secrets.STAGING_URL || 'https://examfitde.lovable.app' }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
      E2E_QA_ALLACCESS_EMAIL: ${{ secrets.E2E_QA_ALLACCESS_EMAIL }}
      E2E_QA_ALLACCESS_PASSWORD: ${{ secrets.E2E_QA_ALLACCESS_PASSWORD }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      E2E_SMOKE_NO_ENTITLEMENT_EMAIL: ${{ secrets.E2E_SMOKE_NO_ENTITLEMENT_EMAIL }}
      E2E_SMOKE_NO_ENTITLEMENT_PASSWORD: ${{ secrets.E2E_SMOKE_NO_ENTITLEMENT_PASSWORD }}
      # Pin a deterministic course/lesson to keep this gate stable across catalog changes.
      E2E_QA_COURSE_ID: ${{ secrets.E2E_QA_COURSE_ID }}
      E2E_QA_LESSON_ID: ${{ secrets.E2E_QA_LESSON_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
        with:
          required: VITE_SUPABASE_PUBLISHABLE_KEY VITE_SUPABASE_URL
      - name: Step 1 — Course readiness DB-gate
        run: node scripts/guards/learner-course-readiness.mjs --max-empty=30
      - name: Step 2 — Validate QA pins point at live data
        run: node scripts/guards/qa-pins-validation.mjs
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Step 3 — Run progress-persistence E2E
        run: |
          bunx playwright test tests/e2e/learner-progress-persistence.spec.ts \
            --reporter=list,json,html \
            || echo "playwright_failed=1" >> $GITHUB_ENV
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results.json
      - name: Step 4 — Render CI artifact summary
        if: always()
        run: node scripts/ci/learner-progress-summary.mjs playwright-report/results.json
      - name: Fail job if Playwright failed
        if: env.playwright_failed == '1'
        run: exit 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: learner-progress-persistence
          path: |
            playwright-report/
            test-results/
            qa-pins-validation.json
          retention-days: 14
