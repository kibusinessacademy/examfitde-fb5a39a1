name: Post-Publish Growth Policies Guard

on:
  pull_request:
    paths:
      - 'supabase/functions/post-publish-growth-worker/**'
      - 'supabase/migrations/**'
      - 'scripts/guards/post-publish-growth-policies-guard.mjs'
      - '.github/workflows/post-publish-growth-policies-guard.yml'
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch: {}

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/guards/post-publish-growth-policies-guard.mjs
