name: GTM Event Mapping Guard

# Verhindert, dass neue FunnelEventType-Werte ohne explizites GTM-Mapping
# in src/lib/gtm.ts (FUNNEL_TO_GTM_EVENT) landen. GTM ist Fan-out-Schicht;
# jeder neue Funnel-Event muss kanonisch im Container ankommen.

on:
  push:
    branches: [main]
    paths:
      - "src/lib/conversionTracking.ts"
      - "src/lib/gtm.ts"
      - "docs/analytics/funnel-events.schema.json"
      - "scripts/guards/gtm-event-mapping-guard.mjs"
      - ".github/workflows/gtm-event-mapping-guard.yml"
  pull_request:
    paths:
      - "src/lib/conversionTracking.ts"
      - "src/lib/gtm.ts"
      - "docs/analytics/funnel-events.schema.json"
      - "scripts/guards/gtm-event-mapping-guard.mjs"
  workflow_dispatch:

jobs:
  gtm-mapping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run GTM Event Mapping Guard
        run: node scripts/guards/gtm-event-mapping-guard.mjs
