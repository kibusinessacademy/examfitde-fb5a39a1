name: GTM Event Mapping Guard

# Verhindert, dass neue FunnelEventType-Werte ohne explizites GTM-Mapping
# in src/lib/gtm.ts (FUNNEL_TO_GTM_EVENT) landen. GTM ist Fan-out-Schicht;
# jeder neue Funnel-Event muss kanonisch im Container ankommen.

on:
  workflow_dispatch:

permissions: read-all

jobs:
  gtm-mapping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run GTM Event Mapping Guard
        run: node scripts/guards/gtm-event-mapping-guard.mjs
