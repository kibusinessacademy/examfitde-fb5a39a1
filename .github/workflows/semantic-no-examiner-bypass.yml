name: Semantic No-Examiner-Bypass Guard

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Run semantic guard
        run: node scripts/guards/semantic-no-examiner-bypass.mjs
