name: b2c-ssot-server-smoke

# Live-Mode-sicherer CI-Gate für die B2C-Pipeline.
# Ruft b2c-ssot-smoke Edge Function auf — kein Stripe-Roundtrip,
# nur synthetischer Order→Trigger→8-Artefakte-Pfad inkl. Idempotenz-Re-Run.

on:
  push:
    paths:
      - 'supabase/functions/stripe-webhook/**'
      - 'supabase/functions/stripe-webhook-smoke/**'
      - 'supabase/functions/create-product-checkout/**'
      - 'supabase/functions/b2c-ssot-smoke/**'
      - 'scripts/b2c-ssot-server-smoke.mjs'
      - 'scripts/stripe-webhook-smoke.mjs'
      - '.github/workflows/b2c-ssot-server-smoke.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'  # alle 6h

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Stripe-Webhook Signed-Event Smoke (handler-level, fast-fail)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_MODE: 'both'
          SMOKE_CLEANUP: 'true'
        run: node scripts/stripe-webhook-smoke.mjs
      - name: Run B2C SSOT Server-Smoke (DB pipeline, single+bundle+refund)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_CLEANUP: 'true'
        run: node scripts/b2c-ssot-server-smoke.mjs
