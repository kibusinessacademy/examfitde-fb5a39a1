name: b2c-ssot-server-smoke

# Live-Mode-sicherer CI-Gate für die B2C-Pipeline.
# Ruft b2c-ssot-smoke Edge Function auf — kein Stripe-Roundtrip,
# nur synthetischer Order→Trigger→8-Artefakte-Pfad inkl. Idempotenz-Re-Run.

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL
          mode: strict
      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Stripe-Webhook Signed-Event Smoke (handler-level, fast-fail)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_MODE: 'both'
          SMOKE_CLEANUP: 'true'
        run: node scripts/stripe-webhook-smoke.mjs
      - name: Run B2C SSOT Server-Smoke (DB pipeline, single+bundle+refund)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_CLEANUP: 'true'
        run: node scripts/b2c-ssot-server-smoke.mjs
