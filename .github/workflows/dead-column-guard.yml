name: Dead Column Guard

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/dead-column-candidates.json"
      - "scripts/dead-column-audit.mjs"
  workflow_dispatch:

permissions: read-all

jobs:
  guard:
    name: Refuse DROP COLUMN if column still referenced
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          required: SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Detect DROP COLUMN diffs
        id: detect
        shell: bash
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          # Find newly-added DROP COLUMN statements only
          DIFF=$(git diff --no-color "$BASE" -- supabase/migrations | grep -E '^\+' | grep -iE 'DROP\s+COLUMN' || true)
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No DROP COLUMN statements detected. Skipping."
            exit 0
          fi
          echo "$DIFF"
          # Extract candidate table.column pairs (best-effort regex)
          echo "$DIFF" | grep -oiE 'ALTER TABLE\s+(public\.)?[a-z0-9_]+\s+DROP\s+COLUMN\s+[a-z0-9_]+' \
            | awk '{print tolower($0)}' | sort -u > /tmp/dropcols.txt || true
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run dead-column audit (hard-fail on unsafe)
        if: steps.detect.outputs.skip != 'true'
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HARD_FAIL_ON_UNSAFE: "1"
        run: |
          # Install ripgrep
          sudo apt-get update -qq && sudo apt-get install -y ripgrep
          node scripts/dead-column-audit.mjs
