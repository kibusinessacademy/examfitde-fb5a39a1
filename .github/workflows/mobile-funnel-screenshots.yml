name: mobile-funnel-screenshots

on:
  workflow_dispatch:

permissions: read-all

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_TARGET: preview
      PREVIEW_URL: ${{ github.event.inputs.target_url || secrets.PREVIEW_URL || 'https://examfitde.lovable.app' }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Run mobile-funnel-screenshots
        run: bunx playwright test --project=mobile-screenshots
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-funnel-screenshots
          path: |
            artifacts/mobile-funnel-screenshots
            playwright-report
            test-results
          retention-days: 14
