name: seo-schema-ssot

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/guards/seo-schema-ssot.mjs"
      - "scripts/guards/seo-schema-ssot.baseline.json"
      - ".github/workflows/seo-schema-ssot.yml"
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run guard
        run: node scripts/guards/seo-schema-ssot.mjs
