name: Ops Guard Alerts

on:
  workflow_dispatch:

permissions: read-all


jobs:
  alerts:
    timeout-minutes: 15
    name: Check Ops Guard Alerts
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Fetch open ops alerts from Supabase
        id: fetch
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          since=$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")

          resp=$(curl -sS \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL}/rest/v1/ops_alert_events?select=id,created_at,alert_key,severity,summary,details&resolved_at=is.null&created_at=gte.${since}&order=created_at.desc&limit=50")

          echo "$resp" > alerts.json

          count=$(python3 -c "import json; print(len(json.load(open('alerts.json'))))")
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Create or update issue
        if: steps.fetch.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const alerts = JSON.parse(fs.readFileSync('alerts.json','utf8'));
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            const title = "🛡️ Ops Guard Alerts (Nightly)";
            const label = "ops-guard";

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch {
              await github.rest.issues.createLabel({ owner, repo, name: label, color: 'e11d48', description: 'Ops Guard Pack alerts' });
            }

            const issues = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: label, per_page: 50 });
            const existing = issues.data.find(i => i.title === title);

            const lines = [];
            lines.push(`## Ops Guard found **${alerts.length}** open alert(s)\n`);
            lines.push(`| Severity | Alert | Summary | Time |`);
            lines.push(`|----------|-------|---------|------|`);
            for (const a of alerts) {
              lines.push(`| ${a.severity.toUpperCase()} | \`${a.alert_key}\` | ${a.summary} | ${a.created_at} |`);
            }
            lines.push("");
            lines.push("<details><summary>Raw JSON</summary>\n");
            lines.push("```json");
            lines.push(JSON.stringify(alerts, null, 2).slice(0, 6000));
            lines.push("```\n</details>");
            lines.push("\n---\n*Auto-generated by ExamFit Ops Guard Pack*");

            const body = lines.join("\n");

            if (!existing) {
              await github.rest.issues.create({ owner, repo, title, body, labels: [label] });
              console.log("Created new ops-guard issue");
            } else {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
              console.log(`Updated existing issue #${existing.number}`);
            }

      - name: No alerts
        if: steps.fetch.outputs.count == '0'
        run: echo "✅ No open ops alerts in last 24h."

      - name: Create issue on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: "Ops Guard Alerts"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/ci/issue-on-fail.mjs
