name: Pricing Integrity Regression Guard

# Verifiziert nach jeder Migration & Push auf main, dass keine Pricing-Drift
# besteht (alle published Packages haben genau 1 aktiven Preis, keine Duplikate,
# keine manuellen Review-Fälle).

on:
  push:
    branches: [ main ]
    paths:
      - "supabase/migrations/**"
      - "scripts/pricing-integrity-check.mjs"
      - ".github/workflows/pricing-integrity-guard.yml"
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/pricing-integrity-check.mjs"
  schedule:
    # Hourly safety net — drift-detection independent of migrations.
    - cron: "23 * * * *"
  workflow_dispatch:

jobs:
  pricing-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate required secrets
        uses: ./.github/actions/validate-db-secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        with:
          required: SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Run Pricing Integrity Check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/pricing-integrity-check.mjs
