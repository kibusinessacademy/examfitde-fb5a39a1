name: SQL Migration Guard
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write


jobs:
  lint:
    name: Static guardrails + Shadow-DB smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: supabase/postgres:15.1.1.78
        env:
          POSTGRES_PASSWORD: shadow
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Verify Node.js 24
        run: |
          echo "Node version: $(node -v)"
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          if [ "$NODE_MAJOR" != "24" ]; then
            echo "::error::Expected Node.js 24, got $(node -v)"
            exit 1
          fi
      - name: Install pg client (optional, for shadow exec)
        run: npm install --no-save pg@8

      - name: Run static guardrails
        run: |
          if [ "${{ inputs.mode }}" = "all" ]; then
            node scripts/guards/sql-migration-guard.mjs --all
          else
            node scripts/guards/sql-migration-guard.mjs
          fi
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: Run Shadow-DB cumulative replay (all migrations up to target)
        if: success()
        env:
          SHADOW_DATABASE_URL: postgres://postgres:shadow@localhost:5432/shadow
          GITHUB_BASE_REF: ${{ github.base_ref }}
          # Default = cumulative replay: apply ALL migrations chronologically up
          # to the latest changed file so dependency drift surfaces early.
          # Set SHADOW_PER_FILE_ROLLBACK=1 to fall back to legacy per-file mode.
        run: node scripts/guards/sql-migration-guard.mjs
