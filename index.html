    <!--
      KEIN statischer Canonical / hreflang im SPA-Shell!
      Per-Route canonical/hreflang wird via @/components/seo/SEOHead gesetzt.
      Geschützte Routen + Non-Authority-Hosts werden via
      @/components/seo/RouteNoindex auf noindex,nofollow gesetzt + Canonical
      auf https://berufos.com${pathname} normalisiert.
    -->

    <!--
      SEO Authority Guard (Pre-Hydration Fallback)
      SSOT: src/lib/seo/authorityHost.ts
      Nur berufos.com + www.berufos.com sind SEO-autoritativ. Auf JEDEM anderen
      Host (lovable.app, vercel.app, id-preview--*, localhost, examfit.de,
      examfitwork.de, berufski.de):
        - robots = noindex,nofollow,noarchive,nosnippet
        - canonical → https://berufos.com${pathname} (Tracking-Params gestrippt)
      Minimal, ohne React/Router/Supabase. Läuft vor Hydration. RouteNoindex
      übernimmt nach Hydration und reagiert auf Client-Navigation.
    -->
    <script>
      (function () {
        try {
          var host = (window.location.hostname || '').toLowerCase().trim();
          var AUTHORITY = ['berufos.com', 'www.berufos.com'];
          if (AUTHORITY.indexOf(host) !== -1) return;

          var robots = document.querySelector('meta[name="robots"]');
          if (!robots) {
            robots = document.createElement('meta');
            robots.setAttribute('name', 'robots');
            document.head.appendChild(robots);
          }
          robots.setAttribute('content', 'noindex, nofollow, noarchive, nosnippet');

          var path = window.location.pathname || '/';
          if (path.length > 1 && path.charAt(path.length - 1) === '/') {
            path = path.slice(0, -1);
          }
          var canonHref = 'https://berufos.com' + path;
          var existing = document.querySelector('link[rel="canonical"]');
          if (existing) {
            existing.setAttribute('href', canonHref);
          } else {
            var link = document.createElement('link');
            link.setAttribute('rel', 'canonical');
            link.setAttribute('href', canonHref);
            document.head.appendChild(link);
          }
        } catch (e) { /* fail-open */ }
      })();
    </script>
