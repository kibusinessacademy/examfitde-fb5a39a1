<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,follow" />
    <title>404 — Seite nicht gefunden | ExamFit</title>
    <meta name="description" content="Diese Seite existiert nicht (mehr). Zurück zur Startseite oder zum Kurskatalog." />
    <link rel="canonical" href="https://www.examfit.de/404" />
    <style>
      :root { color-scheme: light dark; }
      html,body { margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#0b1220; color:#e6edf7; }
      main { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; }
      h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 .5rem; letter-spacing:-0.02em; }
      p  { color:#9fb0c8; max-width: 38rem; line-height:1.55; }
      a.btn { display:inline-block; margin-top:1.5rem; padding:.75rem 1.25rem; border-radius:.5rem; background:#2dd4a8; color:#0b1220; font-weight:600; text-decoration:none; }
      a.btn + a.btn { margin-left:.5rem; background:transparent; color:#e6edf7; border:1px solid #2c3a52; }
    </style>
  </head>
  <body>
    <main>
      <h1>404 — Seite nicht gefunden</h1>
      <p>Die angeforderte URL existiert nicht oder wurde verschoben. Crawler: diese Antwort ist <code>noindex</code> und liefert HTTP 404.</p>
      <div>
        <a class="btn" href="/">Zur Startseite</a>
        <a class="btn" href="/kurse">Kurskatalog</a>
      </div>
    </main>
  </body>
</html>
